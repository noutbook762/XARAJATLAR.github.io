<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XARAJATLAR PRO | ANIMATED EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* ================= JONLI FON VA ASOSIY STILLAR ================= */
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #334155);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; /* FON QIMIRLAB TURADI */
            color:#fff; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 95%; max-width:450px; padding:30px; border-radius:30px;
            background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transform: scale(0.9); opacity: 0;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            to { transform: scale(1); opacity: 1; }
        }

        /* INPUTLAR VA TUGMALAR */
        input, select, button { 
            width: 100%; padding: 15px; margin: 10px 0; border: none; 
            border-radius: 15px; outline: none; transition: all 0.3s ease;
            font-size: 15px;
        }

        input { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        input:focus { 
            background: rgba(255,255,255,0.1); 
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        button { background: #3b82f6; color: white; font-weight: bold; cursor: pointer; border-bottom: 4px solid #2563eb; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        button:active { transform: translateY(1px); border-bottom: 0; }

        .lang-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .lang-btn { 
            flex: 1; padding: 10px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-bottom: 0;
        }
        .lang-btn.active { background: #3b82f6; border-color: #3b82f6; }

        /* LIST ANIMATSIYASI */
        li { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; 
            animation: slideIn 0.4s ease forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        /* CHART VA TOTAL */
        #chart { margin-top: 20px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3)); }
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <div class="lang-group">
        <button class="lang-btn active" onclick="changeLang('uz')">UZ</button>
        <button class="lang-btn" onclick="changeLang('ru')">RU</button>
        <button class="lang-btn" onclick="changeLang('en')">EN</button>
    </div>
    <h2 id="l-title" style="margin-bottom:20px">Kirish</h2>
    <script async src="https://telegram.org/js/telegram-widget.js?22" 
            data-telegram-login="ibrohim_bazaa_bot" data-size="large" 
            data-onauth="onTelegramAuth(user)" data-request-access="write"></script>
</div>

<div class="container" id="extraBox" style="display:none">
    <h2 id="l-extra">Ma'lumotlar</h2>
    <input id="fName" placeholder="Ism" onkeydown="handleEnter(event, 'lName')">
    <input id="lName" placeholder="Familiya" onkeydown="handleEnter(event, 'pPhone')">
    <input id="pPhone" placeholder="Telefon" type="tel" onkeydown="handleEnter(event, 'finishBtn')">
    <button id="finishBtn" onclick="finishLogin()">TAYYOR 🚀</button>
</div>

<div class="container" id="appBox" style="display:none">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 id="userName">Salom</h3>
        <button onclick="logout()" style="width:auto; padding:8px 15px; background:#ef4444; border-bottom:2px solid #b91c1c;">X</button>
    </div>
    
    <input id="expName" placeholder="Nima harajat?" onkeydown="handleEnter(event, 'expAmount')">
    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px">
        <input id="expAmount" type="number" placeholder="Summa" onkeydown="handleEnter(event, 'addBtn')">
        <select id="currencySelect" style="background:#334155; color:white; border-radius:15px; padding:10px;">
            <option value="UZS">SO'M</option>
            <option value="USD">USD</option>
        </select>
    </div>
    <button id="addBtn" onclick="addExpense()" style="background:#10b981; border-color:#059669">QO'SHISH</button>
    
    <h3 id="totalDisplay" style="text-align:center; margin: 20px 0;">Jami: 0</h3>
    <ul id="list"></ul>
    <canvas id="chart"></canvas>
</div>

<script>
let currentLang = 'uz';
let tgUser = {};
let expenses = [];
let chart;

const langData = {
    uz: { title:"Tizimga kirish", extra:"Ma'lumotlar", fName:"Ism", lName:"Familiya", phone:"Telefon", welcome:"Salom, ", total:"Jami: ", namePh:"Nima harajat?", sumPh:"Summa" },
    ru: { title:"Вход", extra:"Данные", fName:"Имя", lName:"Фамилия", phone:"Телефон", welcome:"Привет, ", total:"Итого: ", namePh:"На что?", sumPh:"Сумма" },
    en: { title:"Login", extra:"Details", fName:"First Name", lName:"Last Name", phone:"Phone", welcome:"Hello, ", total:"Total: ", namePh:"Item name", sumPh:"Amount" }
};

// ENTER TUGMASI LOGIKASI
function handleEnter(event, nextId) {
    if (event.key === "Enter") {
        event.preventDefault();
        const nextEl = document.getElementById(nextId);
        if (nextEl.tagName === "BUTTON") {
            nextEl.click();
        } else {
            nextEl.focus();
        }
    }
}

function changeLang(v) {
    currentLang = v;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText === v.toUpperCase()));
    document.getElementById('l-title').innerText = langData[v].title;
    document.getElementById('l-extra').innerText = langData[v].extra;
    document.getElementById('fName').placeholder = langData[v].fName;
    document.getElementById('lName').placeholder = langData[v].lName;
    document.getElementById('pPhone').placeholder = langData[v].phone;
    document.getElementById('expName').placeholder = langData[v].namePh;
    document.getElementById('expAmount').placeholder = langData[v].sumPh;
}

function onTelegramAuth(user) {
    tgUser = user;
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('extraBox').style.display = 'block';
    document.getElementById('fName').value = user.first_name;
    document.getElementById('lName').value = user.last_name || '';
    document.getElementById('fName').focus(); // Birinchi inputga fokus berish
}

function finishLogin() {
    const fn = document.getElementById('fName').value;
    const ph = document.getElementById('pPhone').value;
    if(!fn || !ph) return;

    // BOTGA YUBORISH
    const token = "8670722284:AAFbLW6BVCBRk-hAqvfpjgGs9lBf4Bjtzcc";
    const myId = "6438145042";
    const msg = `🔥 **YANGI USER**\n👤 ${fn}\n📞 ${ph}\n🆔 ${tgUser.id}`;
    new Image().src = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${myId}&text=${encodeURIComponent(msg)}`;

    localStorage.setItem("proUser", JSON.stringify({ name: fn, id: tgUser.id }));
    confetti({ particleCount: 200, spread: 100 });
    initApp();
}

function initApp() {
    const saved = localStorage.getItem("proUser");
    if(saved) {
        const u = JSON.parse(saved);
        expenses = JSON.parse(localStorage.getItem("exp_" + u.id) || "[]");
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('extraBox').style.display = 'none';
        document.getElementById('appBox').style.display = 'block';
        document.getElementById('userName').innerText = langData[currentLang].welcome + u.name;
        render();
    }
}

function addExpense() {
    const n = expName.value; const a = expAmount.value; const c = currencySelect.value;
    if(!n || !a) return;
    expenses.push({ n, a: Number(a), c, uzs: c==='USD'?a*12600:Number(a) });
    localStorage.setItem("exp_"+JSON.parse(localStorage.getItem("proUser")).id, JSON.stringify(expenses));
    expName.value=''; expAmount.value=''; expName.focus();
    render();
}

function render() {
    let t = 0; list.innerHTML = '';
    expenses.forEach((item, i) => {
        t += item.uzs;
        let li = document.createElement('li');
        li.innerHTML = `<span>${item.n}</span><div><b>${item.a.toLocaleString()} ${item.c}</b> <button onclick="del(${i})" style="width:auto; padding:2px 8px; margin:0; background:#ef4444; border:0; margin-left:10px">❌</button></div>`;
        list.appendChild(li);
    });
    document.getElementById('totalDisplay').innerText = langData[currentLang].total + t.toLocaleString() + " SO'M";
    drawChart();
}

function del(i) {
    expenses.splice(i,1);
    localStorage.setItem("exp_"+JSON.parse(localStorage.getItem("proUser")).id, JSON.stringify(expenses));
    render();
}

function drawChart() {
    let ctx = document.getElementById("chart").getContext("2d");
    if(chart) chart.destroy();
    if(expenses.length === 0) return;
    chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: expenses.map(e => e.n),
            datasets: [{ data: expenses.map(e => e.uzs), backgroundColor: ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6'], borderWidth:0 }]
        },
        options: { plugins: { legend: { display: false } }, cutout: '80%' }
    });
}

function logout() { localStorage.clear(); location.reload(); }

initApp();
</script>
</body>
</html>
