<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro V21</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --s: #a855f7; --g: rgba(255, 255, 255, 0.12); --b: rgba(255, 255, 255, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a); color: white; overflow: hidden; 
        }
        .card { 
            width: 90%; max-width: 400px; padding: 30px; background: var(--g); 
            backdrop-filter: blur(25px); border-radius: 35px; border: 1px solid var(--b); 
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
        }
        h1 { font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        input, select { 
            width: 100%; padding: 16px; margin: 8px 0; background: rgba(255,255,255,0.08); 
            border: 1px solid var(--b); border-radius: 18px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--p); background: rgba(255,255,255,0.15); }
        button { 
            width: 100%; padding: 18px; background: linear-gradient(90deg, var(--p), var(--s)); 
            border: none; border-radius: 18px; color: white; font-weight: 900; cursor: pointer; margin-top: 10px;
        }
        button:active { transform: scale(0.96); }
        .lang-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .lang-btn { cursor: pointer; opacity: 0.4; font-weight: 900; transition: 0.3s; }
        .lang-btn.active { opacity: 1; color: var(--p); transform: scale(1.1); }
        #history { max-height: 130px; overflow-y: auto; margin-top: 15px; }
        .item { display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 6px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div class="lang-bar">
        <span class="lang-btn active" onclick="setLang('uz')">UZ</span>
        <span class="lang-btn" onclick="setLang('ru')">RU</span>
        <span class="lang-btn" onclick="setLang('en')">EN</span>
    </div>

    <!-- KIRISH -->
    <div id="step-1">
        <h1 data-tr="t_login">KIRISH</h1>
        <div id="tg-login-btn"></div>
    </div>

    <!-- PROFIL -->
    <div id="step-2" style="display:none;">
        <h1 data-tr="t_prof">PROFIL</h1>
        <input type="text" id="fn" data-ph="ph_fn" onkeydown="nav(event, 'ln')">
        <input type="text" id="ln" data-ph="ph_ln" onkeydown="nav(event, 'ph')">
        <!-- Telefon inputiga maska berilgan -->
        <input type="tel" id="ph" value="+998 " maxlength="19" onkeydown="nav(event, 'sv')" oninput="mask(this)">
        <button id="sv" onclick="saveProf()" data-tr="b_save">SAQLASH ✅</button>
    </div>

    <!-- DASHBOARD -->
    <div id="step-3" style="display:none;">
        <div style="display:flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px;">
            <b id="user-info"></b>
            <span onclick="reset()" style="cursor:pointer; opacity:0.6" data-tr="b_out">CHIQISH</span>
        </div>
        <div style="height: 120px; position:relative; margin-bottom:15px;">
            <canvas id="chart"></canvas>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <input type="text" id="ex-n" data-ph="ph_ex" onkeydown="nav(event, 'ex-v')">
            <input type="number" id="ex-v" data-ph="ph_sum" onkeydown="nav(event, 'add')">
        </div>
        <button id="add" onclick="addEx()" data-tr="b_add">QO'SHISH +</button>
        <div id="history"></div>
    </div>
</div>

<script>
    const BT = "8234703203:AAEag9x1fDNj7mg1okyzpycfiXmsG_zVwas";
    const AD = "6438145042";
    let L = 'uz', U = null, E = [], CH = null;

    const TR = {
        uz: { t_login: "KIRISH", t_prof: "PROFIL", b_save: "SAQLASH", b_out: "CHIQISH", b_add: "QO'SHISH", ph_fn: "Ismingiz", ph_ln: "Familiyangiz", ph_ex: "Nima xarid?", ph_sum: "Summa" },
        ru: { t_login: "ВХОД", t_prof: "ПРОФИЛЬ", b_save: "СОХРАНИТЬ", b_out: "ВЫХОД", b_add: "ДОБАВИТЬ", ph_fn: "Имя", ph_ln: "Фамилия", ph_ex: "Что купили?", ph_sum: "Сумма" },
        en: { t_login: "LOGIN", t_prof: "PROFILE", b_save: "SAVE", b_out: "LOGOUT", b_add: "ADD", ph_fn: "Firstname", ph_ln: "Lastname", ph_ex: "Expense", ph_sum: "Amount" }
    };

    function setLang(lang) {
        L = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === lang));
        document.querySelectorAll('[data-tr]').forEach(el => el.innerText = TR[lang][el.getAttribute('data-tr')]);
        document.querySelectorAll('[data-ph]').forEach(el => el.placeholder = TR[lang][el.getAttribute('data-ph')]);
    }

    // Telefon maskasi: +998 (90) 123-45-67
    function mask(i) {
        let v = i.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,2})(\d{0,3})(\d{0,2})(\d{0,2})/);
        i.value = !v[2] ? "+998 " : "+998 (" + v[2] + (v[3] ? ") " + v[3] : "") + (v[4] ? "-" + v[4] : "") + (v[5] ? "-" + v[5] : "");
    }

    function nav(e, next) {
        if(e.key === 'Enter') {
            e.preventDefault();
            const el = document.getElementById(next);
            if(el.tagName === 'BUTTON') el.click(); else {
                el.focus();
                // Kursorni oxiriga qo'yish
                if(el.type === 'tel' || el.type === 'text') {
                    setTimeout(() => { el.selectionStart = el.selectionEnd = el.value.length; }, 0);
                }
            }
        }
    }

    function onTelegramAuth(user) {
        U = user;
        document.getElementById('step-1').style.display = 'none';
        document.getElementById('step-2').style.display = 'block';
    }

    async function saveProf() {
        const f = document.getElementById('fn').value, l = document.getElementById('ln').value, p = document.getElementById('ph').value;
        if(!f || !l || p.length < 18) return alert("To'liq to'ldiring!");

        const msg = `👤 **YANGI USER**\n\nIsm: ${f}\nFam: ${l}\nTel: ${p}\nID: ${U?.id}\nUser: @${U?.username || 'yoq'}`;
        
        try {
            await fetch(`https://api.telegram.org/bot${BT}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: AD, text: msg, parse_mode: 'Markdown' })
            });
            localStorage.setItem('u_v21', JSON.stringify({f, l, p, id: U?.id}));
            location.reload();
        } catch(e) { alert("Xabar ketmadi!"); }
    }

    function addEx() {
        const n = document.getElementById('ex-n'), v = document.getElementById('ex-v');
        if(!n.value || !v.value) return;
        E.push({n: n.value, v: v.value, d: new Date().toLocaleTimeString()});
        localStorage.setItem('e_v21_'+JSON.parse(localStorage.getItem('u_v21')).id, JSON.stringify(E));
        render();
        n.value = ''; v.value = ''; n.focus();
        confetti({particleCount: 50, spread: 60});
    }

    function render() {
        const h = document.getElementById('history'); h.innerHTML = '';
        E.slice().reverse().forEach(x => {
            h.innerHTML += `<div class="item"><span>${x.n}</span><b>${Number(x.v).toLocaleString()}</b></div>`;
        });
        updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        if(CH) CH.destroy();
        CH = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: E.map(x => x.d), 
                datasets: [{ label: 'Xarajat', data: E.map(x => x.v), borderColor: '#a855f7', tension: 0.4, fill: true, backgroundColor: 'rgba(168, 85, 247, 0.1)' }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { display: false } } }
        });
    }

    function init() {
        setLang('uz');
        const saved = localStorage.getItem('u_v21');
        if(saved) {
            const user = JSON.parse(saved);
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-3').style.display = 'block';
            document.getElementById('user-info').innerText = `${user.f} ${user.l}`.toUpperCase();
            E = JSON.parse(localStorage.getItem('e_v21_'+user.id) || "[]");
            render();
        } else {
            const s = document.createElement('script');
            s.src = "https://telegram.org/js/telegram-widget.js?22";
            s.setAttribute('data-telegram-login', 'ibo_aka_bot');
            s.setAttribute('data-onauth', 'onTelegramAuth(user)');
            document.getElementById('tg-login-btn').appendChild(s);
        }
    }

    function reset() { localStorage.clear(); location.reload(); }
    init();
</script>
</body>
</html>
