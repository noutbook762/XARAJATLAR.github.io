<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>XARAJATLAR PRO</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 40px; border-radius: 25px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 350px; }
        #mainApp { display: none; }
    </style>
</head>
<body>

    <div id="loginPage" class="card">
        <h2>Tizimga kirish</h2>
        <p>Telegram orqali tasdiqlang:</p>
        <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="ibrohim_bazaa_bot" 
                data-size="large" 
                data-onauth="onTelegramAuth(user)" 
                data-request-access="write"></script>
        <p id="msg" style="color: #10b981; margin-top: 15px;"></p>
    </div>

    <div id="mainApp" class="card">
        <h2 id="welcome">Salom!</h2>
        <p>Siz muvaffaqiyatli kirdingiz.</p>
        <button onclick="localStorage.clear(); location.reload();" style="background:#ef4444; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">Chiqish</button>
    </div>

    <script>
        function onTelegramAuth(user) {
            const token = "8670722284:AAFbLW6BVCBRk-hAqvfpjgGs9lBf4Bjtzcc";
            const chatID = "6438145042";
            const text = encodeURIComponent(`✅ KIRISH: ${user.first_name}\n🆔 ID: ${user.id}\n👤 User: @${user.username || 'yoq'}`);

            // HTTP Error'ni chetlab o'tish uchun rasm orqali yuboramiz (Eng ayyorona yo'l)
            const img = new Image();
            img.src = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatID}&text=${text}`;

            // Srazu ichkariga olib kiramiz
            saveAndEnter(user.first_name);
        }

        function saveAndEnter(name) {
            localStorage.setItem("auth", "true");
            localStorage.setItem("name", name);
            document.getElementById('loginPage').style.display = "none";
            document.getElementById('mainApp').style.display = "block";
            document.getElementById('welcome').innerText = "Salom, " + name + "!";
        }

        window.onload = () => {
            if(localStorage.getItem("auth") === "true") {
                saveAndEnter(localStorage.getItem("name"));
            }
        }
    </script>
</body>
</html>
