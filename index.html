<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINANCE PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00ff88; --glass: rgba(255, 255, 255, 0.15); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Outfit', sans-serif; }

        body { 
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
            background: linear-gradient(-45deg, #0f2027, #2c5364, #203a43, #00ff8844);
            background-size: 400% 400%; animation: wave 12s ease infinite;
        }
        @keyframes wave { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .container {
            width: 92%; max-width: 420px; padding: 30px; background: var(--glass);
            backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px; text-align: center; color: #fff;
        }

        .lang-switcher { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .lang-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 5px 12px; border-radius: 10px; cursor: pointer; font-size: 11px; }
        .lang-btn.active { background: var(--neon); color: #000; font-weight: bold; }

        h1 { font-weight: 900; font-size: 24px; margin-bottom: 20px; color: var(--neon); }

        input, select {
            width: 100%; padding: 16px 20px; margin: 8px 0;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px; color: #fff; font-size: 15px; outline: none;
        }

        button {
            width: 100%; padding: 16px; margin-top: 15px; background: var(--neon);
            color: #003311; border: none; border-radius: 18px; font-weight: 900;
            cursor: pointer; transition: 0.4s; text-transform: uppercase;
        }

        .chart-wrap { width: 190px; height: 190px; margin: 0 auto 20px; position: relative; }
        #total-val { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; color: var(--neon); font-weight: 900; }
        #list { max-height: 120px; overflow-y: auto; margin-top: 10px; }
        .item { background: rgba(255,255,255,0.07); padding: 12px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; font-size: 13px; }
        
        /* Kurs ko'rsatkichi (faqat hisob-kitob paytida yashirin ishlaydi) */
        #rate-info { font-size: 10px; opacity: 0.5; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="changeLang('uz')">UZ</button>
        <button class="lang-btn" onclick="changeLang('ru')">RU</button>
        <button class="lang-btn" onclick="changeLang('en')">EN</button>
    </div>

    <!-- LOGIN -->
    <div id="v-login">
        <h1 data-key="login_title">KIRISH</h1>
        <div style="display: flex; justify-content: center;">
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="ibo_aka_bot" 
                data-size="large" 
                data-onauth="onTelegramAuth(user)"
                data-request-access="write"></script>
        </div>
    </div>

    <!-- SETUP -->
    <div id="v-setup" style="display:none;">
        <h1 data-key="profile_title">PROFIL</h1>
        <input type="text" id="in-f" placeholder="Ism">
        <input type="text" id="in-l" placeholder="Familiya">
        <input type="tel" id="in-p" placeholder="+998XXXXXXXXX">
        <button onclick="save()" data-key="save_btn">SAQLASH ✅</button>
    </div>

    <!-- MAIN -->
    <div id="v-main" style="display:none;">
        <div style="display:flex; justify-content: space-between; font-size: 12px; margin-bottom: 10px;">
            <b id="u-name"></b>
            <span onclick="logout()" style="cursor:pointer; opacity:0.5;" data-key="logout">CHIQISH</span>
        </div>
        
        <div id="rate-info">USD Kurs: <span id="current-rate">Yuklanmoqda...</span> UZS</div>

        <div class="chart-wrap">
            <canvas id="myChart"></canvas>
            <div id="total-val">0</div>
        </div>

        <input type="text" id="ex-n" placeholder="Nima xarid?">
        <div style="display: flex; gap: 8px;">
            <input type="number" id="ex-v" placeholder="Summa">
            <select id="ex-c" style="width: 80px; padding: 10px;">
                <option value="UZS">UZS</option>
                <option value="USD">USD</option>
            </select>
        </div>
        <button id="btn-a" onclick="add()" data-key="add_btn">QO'SHISH +</button>
        <div id="list"></div>
    </div>
</div>

<script>
    const langData = {
        uz: { login_title: "KIRISH", profile_title: "PROFIL", save_btn: "SAQLASH ✅", logout: "CHIQISH", add_btn: "QO'SHISH +", ph_name: "Ism", ph_last: "Familiya", ph_tel: "Telefon", ph_ex: "Xarajat nomi", ph_sum: "Summa" },
        ru: { login_title: "ВХОД", profile_title: "ПРОФИЛЬ", save_btn: "СОХРАНИТЬ ✅", logout: "ВЫХОД", add_btn: "ДОБАВИТЬ +", ph_name: "Имя", ph_last: "Фамилия", ph_tel: "Телефон", ph_ex: "Название расхода", ph_sum: "Сумма" },
        en: { login_title: "LOGIN", profile_title: "PROFILE", save_btn: "SAVE ✅", logout: "LOGOUT", add_btn: "ADD +", ph_name: "Name", ph_last: "Lastname", ph_tel: "Phone", ph_ex: "Expense name", ph_sum: "Amount" }
    };

    let currentLang = 'uz', user = null, wallet = [], chart = null, usdRate = 12800; // Standart kurs
    const TOKEN = "8234703203:AAEag9x1fDNj7mg1okyzpycfiXmsG_zVwas";
    const ADMIN = "6438145042";

    // 1. ONLINE KURS olish (NBU API yoki muqobil)
    async function fetchRate() {
        try {
            const response = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
            const data = await response.json();
            const usdData = data.find(c => c.code === "USD");
            if(usdData) {
                usdRate = parseFloat(usdData.Rate);
                document.getElementById('current-rate').innerText = usdRate.toLocaleString();
            }
        } catch (e) {
            console.log("Kursni olib bo'lmadi, standart ishlatiladi.");
            document.getElementById('current-rate').innerText = usdRate.toLocaleString();
        }
    }

    function changeLang(l) {
        currentLang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText === l.toUpperCase()));
        document.querySelectorAll('[data-key]').forEach(el => el.innerText = langData[l][el.getAttribute('data-key')]);
        document.getElementById('in-f').placeholder = langData[l].ph_name;
        document.getElementById('in-l').placeholder = langData[l].ph_last;
        document.getElementById('in-p').placeholder = langData[l].ph_tel;
        document.getElementById('ex-n').placeholder = langData[l].ph_ex;
        document.getElementById('ex-v').placeholder = langData[l].ph_sum;
    }

    function onTelegramAuth(u) {
        user = u;
        document.getElementById('v-login').style.display = 'none';
        document.getElementById('v-setup').style.display = 'block';
    }

    async function save() {
        const f = document.getElementById('in-f').value, l = document.getElementById('in-l').value, p = document.getElementById('in-p').value;
        if(!f || p.length < 9) return; // Ogohlantirishsiz to'xtatish

        const txt = `💎 **YANGI USER**\n👤 ${f} ${l}\n📞 ${p}\n🆔 ${user.id}`;
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: ADMIN, text: txt, parse_mode: 'Markdown'})
        });
        
        localStorage.setItem('wallet_auth_v8', JSON.stringify({n: f, id: user.id}));
        location.reload();
    }

    function init() {
        fetchRate();
        changeLang('uz');
        const auth = localStorage.getItem('wallet_auth_v8');
        if(auth) {
            const u = JSON.parse(auth);
            document.getElementById('v-login').style.display = 'none';
            document.getElementById('v-main').style.display = 'block';
            document.getElementById('u-name').innerText = u.n;
            wallet = JSON.parse(localStorage.getItem('w_v8_'+u.id) || "[]");
            render();
        }
    }

    function add() {
        const n = document.getElementById('ex-n').value, v = document.getElementById('ex-v').value, c = document.getElementById('ex-c').value;
        if(!n || !v) return;
        
        // Agar USD bo'lsa, online kursga ko'paytiradi
        const finalValue = (c === 'USD') ? (v * usdRate) : Number(v);
        
        wallet.push({n, v, c, uzs: finalValue});
        localStorage.setItem('w_v8_'+JSON.parse(localStorage.getItem('wallet_auth_v8')).id, JSON.stringify(wallet));
        document.getElementById('ex-n').value = ''; document.getElementById('ex-v').value = '';
        render();
        confetti({ particleCount: 50, spread: 30, origin: { y: 0.8 } });
    }

    function render() {
        const div = document.getElementById('list'); div.innerHTML = '';
        let t = 0;
        wallet.forEach(i => { t += i.uzs; div.innerHTML += `<div class="item"><span>${i.n}</span><b>${i.v} ${i.c}</b></div>`; });
        document.getElementById('total-val').innerText = Math.round(t).toLocaleString();
        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('myChart'), {
            type: 'doughnut',
            data: { datasets: [{ data: wallet.length ? wallet.map(x=>x.uzs) : [1], backgroundColor: ['#00ff88', 'rgba(255,255,255,0.1)', 'rgba(255,255,255,0.2)'], borderWidth: 0 }] },
            options: { cutout: '85%', plugins: { legend: {display: false} } }
        });
    }

    function logout() { localStorage.clear(); location.reload(); }
    init();
</script>
</body>
</html>
