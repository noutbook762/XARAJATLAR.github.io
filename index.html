<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA FINANCE | STABLE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Glassmorphism Card */
        .card {
            width: 92%; max-width: 400px; padding: 40px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        input, select, button {
            width: 100%; padding: 18px; margin: 10px 0;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; color: #fff; font-size: 16px; outline: none;
        }
        input:focus { border-color: #fff; background: rgba(255,255,255,0.1); }
        button { background: #fff; color: #000; font-weight: 800; cursor: pointer; border: none; text-transform: uppercase; }

        .chart-container { width: 200px; height: 200px; margin: 0 auto 20px; position: relative; }
        #total-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 800; font-size: 18px; }
        
        #exp-list { max-height: 150px; overflow-y: auto; margin-top: 20px; }
        .exp-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<!-- LOGIN SECTION -->
<div class="card" id="view-login">
    <h1 style="margin-bottom: 30px; letter-spacing: -1px;">ULTRA FINANCE</h1>
    <div id="tg-wrapper" style="min-height: 40px; display: flex; justify-content: center;">
        <!-- BOT USERNAME TO'G'RILIGINI TEKSHIRING -->
        <script async src="https://telegram.org/js/telegram-widget.js?22" 
            data-telegram-login="ibrohim_bazaa_bot" 
            data-size="large" 
            data-onauth="onTelegramAuth(user)"></script>
    </div>
    <p id="domain-msg" style="display:none; color: #ff4757; font-size: 12px; margin-top: 20px;">
        ⚠️ Domain Invalid! Iltimos, GitHub saytingizni <b>Incognito (Maxfiy)</b> rejimda ochib ko'ring.
    </p>
</div>

<!-- SETUP SECTION -->
<div class="card" id="view-setup" style="display: none;">
    <h2>PROFILE</h2>
    <input type="text" id="set-fn" placeholder="Ism" onkeydown="enterKey(event, 'set-ln')">
    <input type="text" id="set-ln" placeholder="Familiya" onkeydown="enterKey(event, 'set-ph')">
    <input type="tel" id="set-ph" placeholder="Telefon" onkeydown="enterKey(event, 'btn-save')">
    <button id="btn-save" onclick="sendProfile()">KIRISH 🚀</button>
</div>

<!-- MAIN SECTION -->
<div class="card" id="view-app" style="display: none;">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <span id="user-info" style="font-weight: bold; opacity: 0.6;"></span>
        <button onclick="logout()" style="width: auto; padding: 6px 12px; font-size: 10px; margin: 0;">CHIQISH</button>
    </div>

    <div class="chart-container">
        <canvas id="financeChart"></canvas>
        <div id="total-display">0</div>
    </div>

    <input type="text" id="ex-n" placeholder="Nima xarajat?" onkeydown="enterKey(event, 'ex-v')">
    <div style="display: flex; gap: 10px;">
        <input type="number" id="ex-v" placeholder="Summa" onkeydown="enterKey(event, 'btn-add')">
        <select id="ex-c" style="width: 100px;">
            <option value="UZS">SO'M</option>
            <option value="USD">USD</option>
        </select>
    </div>
    <button id="btn-add" onclick="addItem()">QO'SHISH</button>
    <div id="exp-list"></div>
</div>

<script>
    let userData = null;
    let wallet = [];
    let myChart = null;

    // --- ENTER LOGIKASI ---
    function enterKey(e, nextId) {
        if(e.key === 'Enter') {
            e.preventDefault();
            const target = document.getElementById(nextId);
            if(target.tagName === 'BUTTON') target.click(); else target.focus();
        }
    }

    // --- TELEGRAM LOGIN ---
    function onTelegramAuth(user) {
        userData = user;
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-setup').style.display = 'block';
        document.getElementById('set-fn').focus();
    }

    // --- MA'LUMOTLARNI BOTGA YUBORISH ---
    async function sendProfile() {
        const fn = document.getElementById('set-fn').value;
        const ln = document.getElementById('set-ln').value;
        const ph = document.getElementById('set-ph').value;
        
        if(!fn || !ph) return alert("Majburiy maydonlarni to'ldiring!");

        const token = "8670722284:AAFbLW6BVCBRk-hAqvfpjgGs9lBf4Bjtzcc";
        const chatId = "6438145042";
        const msg = `🌟 **YANGI FOYDALANUVCHI**\n\n👤 **Ism:** ${fn}\n👤 **Familiya:** ${ln || '—'}\n📞 **Tel:** ${ph}\n🆔 **ID:** \`${userData.id}\`\n🔗 **User:** @${userData.username || 'yoq'}`;

        try {
            const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: msg, parse_mode: 'Markdown' })
            });
            if(res.ok) {
                localStorage.setItem('auth_user', JSON.stringify({name: fn, id: userData.id}));
                canvasConfetti();
                setTimeout(() => location.reload(), 1000);
            }
        } catch(e) { alert("Aloqa xatosi!"); }
    }

    function initApp() {
        const saved = localStorage.getItem('auth_user');
        if(saved) {
            const user = JSON.parse(saved);
            document.getElementById('view-login').style.display = 'none';
            document.getElementById('view-app').style.display = 'block';
            document.getElementById('user-info').innerText = user.name;
            wallet = JSON.parse(localStorage.getItem('w_'+user.id) || "[]");
            render();
        }
    }

    function addItem() {
        const n = document.getElementById('ex-n').value;
        const v = document.getElementById('ex-v').value;
        const c = document.getElementById('ex-c').value;
        if(!n || !v) return;

        wallet.push({n, v, c, uzs: (c === 'USD' ? v * 12680 : Number(v))});
        const user = JSON.parse(localStorage.getItem('auth_user'));
        localStorage.setItem('w_'+user.id, JSON.stringify(wallet));
        document.getElementById('ex-n').value = '';
        document.getElementById('ex-v').value = '';
        render();
    }

    function render() {
        const list = document.getElementById('exp-list');
        list.innerHTML = '';
        let total = 0;
        wallet.forEach(i => {
            total += i.uzs;
            list.innerHTML += `<div class="exp-item"><span>${i.n}</span><b>${i.v} ${i.c}</b></div>`;
        });
        document.getElementById('total-display').innerText = total.toLocaleString();
        updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('financeChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { datasets: [{ data: wallet.length ? wallet.map(i => i.uzs) : [1], backgroundColor: ['#fff','#333','#666','#999'], borderWidth: 0 }] },
            options: { cutout: '85%', plugins: { legend: {display: false} } }
        });
    }

    function logout() { localStorage.clear(); location.reload(); }
    function canvasConfetti() { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); }

    initApp();

    // Widget yuklanishini tekshirish
    setTimeout(() => {
        if(document.getElementById('view-login').style.display !== 'none' && !document.querySelector('iframe')) {
            document.getElementById('domain-msg').style.display = 'block';
        }
    }, 4000);
</script>
</body>
</html>
