<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro V20 - Ultra Max</title>
    
    <!-- Tashqi kutubxonalar -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        /* 1. CSS VARIABLES & BASE */
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --danger: #ef4444;
            --success: #22c55e;
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        /* 2. DYNAMIC BACKGROUND ANIMATION */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #581c87, #1e3a8a);
            background-size: 400% 400%;
            animation: meshGradient 15s ease infinite;
            color: var(--text);
            overflow: hidden;
        }

        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 3. GLASS CARD & ANIMATIONS */
        .card {
            width: 90%;
            max-width: 420px;
            padding: 35px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            position: relative;
            z-index: 10;
            animation: entry 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes entry {
            0% { opacity: 0; transform: scale(0.8) translateY(100px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        /* 4. TYPOGRAPHY */
        h1 { font-weight: 900; font-size: 28px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: -1px; }

        /* 5. INPUTS & CONTROLS */
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 12px; opacity: 0.7; margin-left: 10px; font-weight: 600; }

        input, select {
            width: 100%;
            padding: 18px;
            margin-top: 5px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.4s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        input.error { border-color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:hover { transform: scale(1.02); filter: brightness(1.1); box-shadow: 0 15px 30px rgba(168, 85, 247, 0.3); }
        button:active { transform: scale(0.97); }

        /* 6. LIST & CHART SECTION */
        .chart-box { width: 180px; height: 180px; margin: 0 auto 20px; position: relative; }
        #total-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 900; font-size: 20px; }

        #list-container { max-height: 150px; overflow-y: auto; margin-top: 20px; padding-right: 5px; }
        #list-container::-webkit-scrollbar { width: 4px; }
        #list-container::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 14px 20px;
            border-radius: 18px;
            margin-bottom: 10px;
            animation: listIn 0.5s ease backwards;
        }

        @keyframes listIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .del-icon { color: var(--danger); cursor: pointer; font-size: 20px; margin-left: 10px; opacity: 0.5; transition: 0.3s; }
        .del-icon:hover { opacity: 1; transform: scale(1.2); }

        /* 7. LANGUAGE BOX */
        .langs { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; }
        .lang-item { cursor: pointer; opacity: 0.4; font-weight: 900; font-size: 14px; transition: 0.3s; padding: 5px 10px; border-bottom: 2px solid transparent; }
        .lang-item.active { opacity: 1; border-color: var(--primary); transform: scale(1.1); }

    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="langs">
        <span class="lang-item active" onclick="setLang('uz')">UZ</span>
        <span class="lang-item" onclick="setLang('ru')">RU</span>
        <span class="lang-item" onclick="setLang('en')">EN</span>
    </div>

    <!-- STEP 1: LOGIN -->
    <div id="view-login">
        <h1 data-key="title_login">KIRISH</h1>
        <div id="telegram-login-box" style="display: flex; justify-content: center;"></div>
    </div>

    <!-- STEP 2: PROFILE -->
    <div id="view-profile" style="display:none;">
        <h1 data-key="title_profile">PROFIL</h1>
        <div class="input-group">
            <input type="text" id="inp-fname" placeholder="Ismingiz" onkeydown="keyMove(event, 'inp-lname')">
        </div>
        <div class="input-group">
            <input type="text" id="inp-lname" placeholder="Familiyangiz" onkeydown="keyMove(event, 'inp-phone')">
        </div>
        <div class="input-group">
            <input type="tel" id="inp-phone" value="+998" onkeydown="keyMove(event, 'btn-save-profile')">
        </div>
        <button id="btn-save-profile" onclick="saveProfile()" data-key="btn_save">SAQLASH ✅</button>
    </div>

    <!-- STEP 3: DASHBOARD -->
    <div id="view-main" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <p id="greet" style="font-weight: 600; font-size: 14px; color: var(--secondary);"></p>
            <p onclick="logout()" style="font-size: 11px; opacity: 0.5; cursor: pointer; text-decoration: underline;">LOGOUT</p>
        </div>

        <div class="chart-box">
            <canvas id="mainChart"></canvas>
            <div id="total-val">0</div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 8px;">
            <input type="text" id="ex-name" placeholder="Nima?" onkeydown="keyMove(event, 'ex-amt')">
            <select id="ex-cur">
                <option value="UZS">UZS</option>
                <option value="USD">USD</option>
            </select>
        </div>
        <input type="number" id="ex-amt" placeholder="Summa" onkeydown="keyMove(event, 'btn-add-ex')">
        <button id="btn-add-ex" onclick="addExpense()" data-key="btn_add">QO'SHISH +</button>

        <div id="list-container"></div>
    </div>
</div>

<script>
    // 8. CONFIGURATION & DATA
    const BOT_TOKEN = "8234703203:AAEag9x1fDNj7mg1okyzpycfiXmsG_zVwas";
    const ADMIN_ID = "6438145042";
    const USD_RATE = 12850;
    
    let state = {
        lang: 'uz',
        user: null,
        expenses: [],
        chart: null
    };

    const dict = {
        uz: { title_login: "KIRISH", title_profile: "PROFIL", btn_save: "SAQLASH", btn_add: "QO'SHISH", ph_name: "Ism", ph_last: "Familiya" },
        ru: { title_login: "ВХОД", title_profile: "ПРОФИЛЬ", btn_save: "СОХРАНИТЬ", btn_add: "ДОБАВИТЬ", ph_name: "Имя", ph_last: "Фамилия" },
        en: { title_login: "LOGIN", title_profile: "PROFILE", btn_save: "SAVE", btn_add: "ADD", ph_name: "Name", ph_last: "Lastname" }
    };

    // 9. CORE LOGIC
    function setLang(l) {
        state.lang = l;
        document.querySelectorAll('.lang-item').forEach(el => el.classList.toggle('active', el.innerText.toLowerCase() === l));
        document.querySelectorAll('[data-key]').forEach(el => el.innerText = dict[l][el.getAttribute('data-key')]);
    }

    function keyMove(e, nextId) {
        if(e.key === 'Enter') {
            e.preventDefault();
            const nextEl = document.getElementById(nextId);
            if(nextEl.tagName === 'BUTTON') nextEl.click();
            else nextEl.focus();
        }
    }

    function onTelegramAuth(user) {
        state.user = user;
        showView('view-profile');
    }

    async function saveProfile() {
        const fn = document.getElementById('inp-fname'), ln = document.getElementById('inp-lname'), ph = document.getElementById('inp-phone');
        
        if(!fn.value || !ln.value || ph.value.length < 10) {
            document.getElementById('mainCard').classList.add('shake');
            setTimeout(() => document.getElementById('mainCard').classList.remove('shake'), 500);
            return;
        }

        const report = `🔔 **YANGI FOYDALANUVCHI**\n` +
                       `━━━━━━━━━━━━━━━━━━\n` +
                       `👤 **FIO:** ${fn.value} ${ln.value}\n` +
                       `📞 **Tel:** ${ph.value}\n` +
                       `🆔 **TG ID:** \`${state.user?.id || 'N/A'}\`\n` +
                       `🔗 **User:** @${state.user?.username || 'yoq'}\n` +
                       `━━━━━━━━━━━━━━━━━━`;

        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: ADMIN_ID, text: report, parse_mode: 'Markdown' })
            });
            
            const userData = { ...state.user, localFname: fn.value, localLname: ln.value, phone: ph.value };
            localStorage.setItem('fpro_user', JSON.stringify(userData));
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => location.reload(), 1500);
        } catch(e) { alert("Xato!"); }
    }

    function addExpense() {
        const name = document.getElementById('ex-name'), amt = document.getElementById('ex-amt'), cur = document.getElementById('ex-cur').value;
        if(!name.value || !amt.value) return;

        const val = Number(amt.value);
        const uzs = cur === 'USD' ? val * USD_RATE : val;

        state.expenses.push({ id: Date.now(), name: name.value, amt: val, cur: cur, uzs: uzs });
        saveData();
        render();
        name.value = ''; amt.value = ''; name.focus();
    }

    function deleteEx(id) {
        state.expenses = state.expenses.filter(e => e.id !== id);
        saveData();
        render();
    }

    function saveData() {
        localStorage.setItem('fpro_data_' + state.user.id, JSON.stringify(state.expenses));
    }

    function render() {
        const container = document.getElementById('list-container');
        container.innerHTML = '';
        let total = 0;

        state.expenses.slice().reverse().forEach(ex => {
            total += ex.uzs;
            container.innerHTML += `
                <div class="list-item">
                    <span>${ex.name}</span>
                    <div style="display:flex; align-items:center;">
                        <b style="color:var(--secondary)">${ex.amt.toLocaleString()} ${ex.cur}</b>
                        <span class="del-icon" onclick="deleteEx(${ex.id})">×</span>
                    </div>
                </div>`;
        });

        document.getElementById('total-val').innerText = Math.round(total).toLocaleString();
        updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(state.chart) state.chart.destroy();

        const dataPoints = state.expenses.length ? state.expenses.map(e => e.uzs) : [1];
        const colors = ['#6366f1', '#a855f7', '#ec4899', '#f59e0b', '#10b981'];

        state.chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: dataPoints,
                    backgroundColor: colors,
                    borderWidth: 0,
                    hoverOffset: 10
                }]
            },
            options: {
                cutout: '85%',
                plugins: { legend: { display: false } },
                animation: { animateRotate: true, duration: 1000 }
            }
        });
    }

    function showView(id) {
        ['view-login', 'view-profile', 'view-main'].forEach(v => document.getElementById(v).style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function init() {
        const savedUser = localStorage.getItem('fpro_user');
        if(savedUser) {
            state.user = JSON.parse(savedUser);
            state.expenses = JSON.parse(localStorage.getItem('fpro_data_' + state.user.id) || "[]");
            showView('view-main');
            document.getElementById('greet').innerText = `SALOM, ${state.user.localFname}!`;
            render();
        } else {
            const script = document.createElement('script');
            script.src = "https://telegram.org/js/telegram-widget.js?22";
            script.setAttribute('data-telegram-login', 'ibo_aka_bot');
            script.setAttribute('data-size', 'large');
            script.setAttribute('data-onauth', 'onTelegramAuth(user)');
            document.getElementById('telegram-login-box').appendChild(script);
        }
        setLang('uz');
    }

    function logout() { localStorage.clear(); location.reload(); }

    window.onload = init;
</script>
</body>
</html>
