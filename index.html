    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --s: #a855f7; --g: rgba(255, 255, 255, 0.1); --b: rgba(255, 255, 255, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b); background-size: 400% 400%; animation: moveBG 15s ease infinite; color: white; overflow: hidden; }
        @keyframes moveBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .card { width: 92%; max-width: 400px; padding: 30px; background: var(--g); backdrop-filter: blur(25px); border-radius: 40px; border: 1px solid var(--b); box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; }
        h1 { font-weight: 900; margin-bottom: 20px; text-align: center; font-size: 24px; }
        input, select { width: 100%; padding: 16px; margin: 8px 0; background: rgba(255,255,255,0.07); border: 1px solid var(--b); border-radius: 18px; color: white; outline: none; transition: 0.3s; }
        input:focus { background: rgba(255,255,255,0.15); border-color: var(--p); }
        .row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; }
        button { width: 100%; padding: 18px; background: linear-gradient(90deg, var(--p), var(--s)); border: none; border-radius: 18px; color: white; font-weight: 900; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .edit-btn { display: inline-block; width: 24px; height: 24px; background: url("data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAkGBxMTEhUSEhIWEhMWFhUYFxYXFRYWFRUTGRUXGRgVFh0YHSggGBslHRUaIzEiJiorLi4uFx81ODUvNygtLisBCgoKBQUFDgUFDisZExkrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrKysrK//AABEIAOEA4QMBIgACEQEDEQH/xAAcAAEAAgIDAQAAAAAAAAAAAAAABwgBBgIEBQP/xABGEAABAwICBgYGBQsDBQEAAAABAAIDBBEFIQYHEjFRcRMiQWGBkQgUQmKhsSMygpKiFSQzQ1JTVHJzstFjk8EXNIPS4Rb/xAAUAQEAAAAAAAAAAAAAAAAAAAAA/8QAFBEBAAAAAAAAAAAAAAAAAAAAAP/aAAwDAQACEQMRAD8AnFERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEWvaQaa0NHcVFVGxw9gHbk+625UfYvr6pm3FNSyy23OkLY2nwG0beSCYkVca3XtiDj9HFTxN7Oo97vMvsfJdX/qljj82Xt7tMCPkUFmEVaP+p2OtzdtW96mAH9q+1JrzxJh68dPIO0GN7T5tfl5ILIooWwnX7EbCppHs74nh452dY/Fb/o/rCw6ssIapgedzJPo38gHb/C6DakS6ICIiAiIgIiICIiAiIgIiICIiAiIgLBKxJIGglxAAFySbAAbyT2BQZrI1xEl1LhrrDNr6jtd3Q93veXFBI2mmsWjw4Fsj+lntlCwgv+0dzBzUKY1rFxXFJOgpg+JrshDTglxB/beBtW8gvQ0E1QVFYRU17nwRO62yT+cS3zudodQHic893ap2wDR+mo4+ipoWRN7bDrOPFzjm480EG6O6jquaz6yZtMDmWgCWU9pub7IPiVI+Dan8LgsXQmocPale4j7os34Lf0QefQ4JTQi0VPFGPdjaPkF3w1ZRBiy6lXhUEotLDHIPeY13zC7iINIxfVRhU9z6sIXftQudH+EHZ+CjrSLUPM27qKoEo7I5RsO5B46pPgFPiIKv4fpbjGDSCKYSBg/UzjaY4e47s+ybKYdB9atHX7Mbz6tUH9W93Vcf9N+53I2K3PFcLhqIzFPEyWM72vaCOY4HvChHTzUq6Panw0l7d5p3G7x/SPtcjn3lBPIKyq8avdbM9I4UuIbckIOztuB6aE3tZ183NHA5iyn+hrY5o2yxPbJG8Atc03Dge0EIOwiIgIiICIiAiIgIiICIiAuMjw0FxIAAJJJsABvJ4LJKgzXlp8S52G0zsh/3D2n6x/cD/ny4oPH1p6x5K+Q0VEXGm2g0lgO1UuvuHbsX3DtW66rdVLKUNqq1okqjYtjNiyDt5Of37h2cU1N6uRSsbW1Lb1LxeNhH6BhH95Bz4DLipXQAiIgIiICIiAiIgIiICxZZRBH2svVnDiDTLFaGrAyfazZbezJblk7eFEmgmmdTg1S6lqmO6DbtLCc3RuyvJH88snBWcWg61NX7MSh6SMBtXG36a27pGi56J/dnkew+KDdsPrY5o2SxPD43tDmuGYLTuK7Crlqf03fQVBoKslkD3lvWy9XmuQb33NJyPA58VYwFBlERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQEREBERAREQf/Z"); background-size: contain; background-repeat: no-repeat; cursor: pointer; filter: brightness(0) invert(1); mix-blend-mode: overlay; transition: 0.4s; vertical-align: middle; }
        .edit-btn:hover { transform: rotate(90deg); }
        .user-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--b); margin-bottom: 15px; }
        .chart-box { position: relative; width: 150px; height: 150px; margin: 0 auto 20px; }
        #total-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-weight: 900; }
        #history { max-height: 120px; overflow-y: auto; margin-top: 15px; }
        .item { display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 5px; font-size: 14px; }
        .del { color: #ff4757; cursor: pointer; font-weight: 900; margin-left: 10px; }
    </style>
</head>
<body>

<div class="card">
    <!-- 1. KIRISH -->
    <div id="step1">
        <h1>KIRISH</h1>
        <div id="tg-login" style="display:flex; justify-content:center;"></div>
    </div>

    <!-- 2. PROFIL (ZANJIR EFFEKTI) -->
    <div id="step2" style="display:none;">
        <h1>PROFIL</h1>
        <input type="text" id="fn" placeholder="Ismingiz" onkeydown="if(event.key==='Enter') document.getElementById('ln').focus()">
        <input type="text" id="ln" placeholder="Familiyangiz" onkeydown="if(event.key==='Enter') document.getElementById('tel').focus()">
        <input type="tel" id="tel" value="+998 " oninput="msk(this)" onkeydown="if(event.key==='Enter') svUsr()">
        <button onclick="svUsr()">SAQLASH ✅</button>
    </div>

    <!-- 3. DASHBOARD (ZANJIR EFFEKTI) -->
    <div id="step3" style="display:none;">
        <div class="user-header">
            <div><span class="edit-btn" onclick="editProfile()"></span> <b id="u-name"></b></div>
            <span onclick="out()" style="cursor:pointer; opacity:0.5; font-size:12px;">EXIT</span>
        </div>
        <div class="chart-box">
            <canvas id="chrt"></canvas>
            <div id="total-val">0<br><small>UZS</small></div>
        </div>
        <input type="text" id="ex-n" placeholder="Nima sotib oldingiz?" onkeydown="if(event.key==='Enter') document.getElementById('ex-v').focus()">
        <div class="row">
            <input type="number" id="ex-v" placeholder="Summa" onkeydown="if(event.key==='Enter') add()">
            <select id="ex-c"><option value="UZS">UZS</option><option value="USD">USD</option></select>
        </div>
        <button onclick="add()">QO'SHISH +</button>
        <div id="history"></div>
    </div>
</div>

<script>
    const BT = "8234703203:AAEag9x1fDNj7mg1okyzpycfiXmsG_zVwas", AD = "6438145042";
    let U = null, E = [], CT = null, RATE = 12850;

    async function getRate() { try { const r = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/'); const d = await r.json(); RATE = parseFloat(d.find(x => x.Ccy === 'USD').Rate); } catch(e) {} }
    function msk(i) { let v = i.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,2})(\d{0,3})(\d{0,2})(\d{0,2})/); i.value = !v[2] ? "+998 " : "+998 (" + v[2] + (v[3] ? ") " + v[3] : "") + (v[4] ? "-" + v[4] : "") + (v[5] ? "-" + v[5] : ""); }
    function onTelegramAuth(user) { U = user; document.getElementById('step1').style.display = 'none'; document.getElementById('step2').style.display = 'block'; }

    async function svUsr() {
        const f = document.getElementById('fn').value, l = document.getElementById('ln').value, p = document.getElementById('tel').value;
        if(!f || !l || p.length < 18) return;
        const uObj = {f, l, id: U?.id || Date.now(), p};
        await fetch(`https://api.telegram.org/bot${BT}/sendMessage?chat_id=${AD}&text=${encodeURIComponent("Yangi User: "+f+" "+l+"\nTel: "+p)}`);
        localStorage.setItem('u_v30', JSON.stringify(uObj));
        location.reload();
    }

    function add() {
        const n = document.getElementById('ex-n'), v = document.getElementById('ex-v'), c = document.getElementById('ex-c').value;
        if(!n.value || !v.value) return;
        E.push({ id: Date.now(), n: n.value, v: Number(v.value), c, uzs: c==='USD'?v.value*RATE:v.value });
        save(); render(); n.value = ''; v.value = ''; n.focus(); // Qaytadan birinchi maydonga fokus
        confetti({particleCount: 40, spread: 50, origin: { y: 0.8 }});
    }

    function editProfile() { const u = JSON.parse(localStorage.getItem('u_v30')); document.getElementById('step3').style.display='none'; document.getElementById('step2').style.display='block'; document.getElementById('fn').value=u.f; document.getElementById('ln').value=u.l; }
    function save() { const u = JSON.parse(localStorage.getItem('u_v30')); localStorage.setItem('e_v30_'+u.id, JSON.stringify(E)); }
    function del(id) { E = E.filter(x => x.id !== id); save(); render(); }

    function render() {
        const h = document.getElementById('history'); h.innerHTML = ''; let t = 0;
        E.slice().reverse().forEach(x => { t += Number(x.uzs); h.innerHTML += `<div class="item"><span>${x.n}</span><b>${x.c==='USD'?'$':''}${Number(x.v).toLocaleString()}</b><span class="del" onclick="del(${x.id})">×</span></div>`; });
        document.getElementById('total-val').innerHTML = `${Math.round(t).toLocaleString()}<br><small>UZS</small>`;
        if(CT) CT.destroy();
        CT = new Chart(document.getElementById('chrt'), { type: 'doughnut', data: { datasets: [{ data: E.length ? E.map(x => x.uzs) : [1], backgroundColor: ['#6366f1', '#a855f7', '#ec4899', '#f59e0b', '#10b981'], borderWidth: 0, cutout: '85%' }] }, options: { plugins: { legend: { display: false } } } });
    }

    window.onload = async () => {
        await getRate();
        const saved = localStorage.getItem('u_v30');
        if(saved) {
            const u = JSON.parse(saved); document.getElementById('step1').style.display = 'none'; document.getElementById('step3').style.display = 'block';
            document.getElementById('u-name').innerText = u.f.toUpperCase();
            E = JSON.parse(localStorage.getItem('e_v30_'+u.id) || "[]"); render();
        } else {
            const s = document.createElement('script'); s.src = "https://telegram.org/js/telegram-widget.js?22";
            s.setAttribute('data-telegram-login', 'ibo_aka_bot'); s.setAttribute('data-onauth', 'onTelegramAuth(user)');
            document.getElementById('tg-login').appendChild(s);
        }
    };
    function out() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
