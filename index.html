<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XARAJATLAR PRO | FIX EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
        body { background: #000; color:#fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .container {
            width: 92%; max-width:440px; padding:30px; border-radius:35px;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(30px);
            box-shadow: 0 0 80px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1); z-index: 10; position: relative;
        }
        .lang-switcher { display: flex; gap: 8px; margin-bottom: 20px; justify-content: center; }
        .lang-btn { width: 50px; height: 32px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor:pointer; font-size: 11px; border-radius: 10px; }
        .lang-btn.active { background: #fff; color: #000; font-weight: bold; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        input, select, button { width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 20px; outline: none; font-size: 16px; }
        input { background: rgba(255,255,255,0.07); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        input:focus { border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.15); }
        button { background: #fff; color: #000; font-weight: 800; cursor: pointer; }
        .chart-box { width: 180px; height: 180px; margin: 10px auto; }
        #list { max-height: 160px; overflow-y: auto; margin-top: 15px; list-style: none; }
        li { background: rgba(255,255,255,0.03); padding: 14px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { width: auto; padding: 6px 12px; background: #ff4757; color:#fff; border-radius: 12px; font-size: 10px; margin:0; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="container" id="loginBox">
    <div class="lang-switcher" id="ls1"></div>
    <h2 style="text-align:center; margin-bottom:25px;">KIRISH</h2>
    <div style="display:flex; justify-content:center;">
        <!-- TELEGRAM WIDGET -->
        <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="ibrohim_bazaa_bot" data-size="large" 
                data-onauth="onTelegramAuth(user)" data-request-access="write"></script>
    </div>
</div>

<div class="container" id="infoBox" style="display:none">
    <div class="lang-switcher" id="ls2"></div>
    <h2 id="t-info" style="text-align: center; margin-bottom: 15px;">MA'LUMOTLAR</h2>
    <input id="fName" placeholder="Ism">
    <input id="lName" placeholder="Familiya">
    <input id="pPhone" type="tel" placeholder="+998">
    <button onclick="finishSetup()">SAQLASH 🚀</button>
</div>

<div class="container" id="appBox" style="display:none">
    <div class="lang-switcher" id="ls3"></div>
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h4 id="userName"></h4>
        <button onclick="logout()" style="width:auto; padding:6px 12px; background:#ff4757; color:#fff; font-size:10px; border-radius:12px;">CHIQISH</button>
    </div>
    <div class="chart-box"><canvas id="myChart"></canvas></div>
    <input id="expName" placeholder="Nima harajat?">
    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px">
        <input id="expAmount" type="number" placeholder="Summa">
        <select id="curr" style="background:#111; color:#fff; border-radius:20px;">
            <option value="UZS">SO'M</option>
            <option value="USD">USD</option>
        </select>
    </div>
    <button onclick="addExp()" style="background:#2ecc71; color:#fff;">QO'SHISH</button>
    <h2 id="total" style="text-align:center; margin:10px 0;">0</h2>
    <ul id="list"></ul>
</div>

<script>
// --- FON VA KURS ---
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let time = 0; let usdRate = 12650;
function initBG() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = initBG; initBG();
function drawBG() {
    time += 0.02; ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "white";
    for(let x=0; x<canvas.width; x+=25) {
        for(let y=0; y<canvas.height; y+=25) {
            let ox = Math.sin(x/100+time)*10; let oy = Math.cos(y/100+time)*10;
            ctx.beginPath(); ctx.arc(x+ox, y+oy, 1, 0, Math.PI*2); ctx.fill();
        }
    }
    requestAnimationFrame(drawBG);
}
drawBG();

// --- LOGIKA ---
let tgData = {}; let expenses = []; let myChart = null;

function onTelegramAuth(user) {
    tgData = user;
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('infoBox').style.display = 'block';
    document.getElementById('fName').value = user.first_name || '';
    document.getElementById('lName').value = user.last_name || '';
}

async function finishSetup() {
    const fName = document.getElementById('fName').value;
    const lName = document.getElementById('lName').value;
    const phone = document.getElementById('pPhone').value;
    
    if(!fName || !phone) return alert("Ism va telefonni kiriting!");

    const token = "8670722284:AAFbLW6BVCBRk-hAqvfpjgGs9lBf4Bjtzcc";
    const chatId = "6438145042";
    
    const text = `🚀 **YANGI FOYDALANUVCHI**\n\n👤 Ism: ${fName}\n👤 Familiya: ${lName}\n📞 Tel: ${phone}\n\n🤖 TG ID: ${tgData.id}\n🔗 User: @${tgData.username || 'yoq'}`;

    try {
        const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'Markdown' })
        });
        
        if(res.ok) {
            localStorage.setItem("vipUser", JSON.stringify({name: fName, id: tgData.id}));
            initApp();
            confetti();
        } else {
            alert("Botga yuborishda xato! GitHub-ga yuklang va /setdomain qiling.");
        }
    } catch(e) {
        alert("Internet yoki Fetch xatosi!");
    }
}

function initApp() {
    const user = JSON.parse(localStorage.getItem("vipUser"));
    if(user) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('infoBox').style.display = 'none';
        document.getElementById('appBox').style.display = 'block';
        document.getElementById('userName').innerText = "Salom, " + user.name;
        expenses = JSON.parse(localStorage.getItem("ex_"+user.id) || "[]");
        render();
    }
}

function addExp() {
    const n = document.getElementById('expName').value;
    const a = document.getElementById('expAmount').value;
    const c = document.getElementById('curr').value;
    if(!n || !a) return;
    const uzs = c === 'USD' ? a * usdRate : Number(a);
    expenses.push({n, a, c, uzs});
    const user = JSON.parse(localStorage.getItem("vipUser"));
    localStorage.setItem("ex_"+user.id, JSON.stringify(expenses));
    render();
}

function render() {
    const list = document.getElementById('list'); list.innerHTML = '';
    let total = 0;
    expenses.forEach((ex, i) => {
        total += ex.uzs;
        list.innerHTML += `<li>${ex.n} <b>${ex.a} ${ex.c}</b> <button class="del-btn" onclick="del(${i})">❌</button></li>`;
    });
    document.getElementById('total').innerText = total.toLocaleString() + " SO'M";
    updateChart();
}

function updateChart() {
    const ctxC = document.getElementById('myChart').getContext('2d');
    if(myChart) myChart.destroy();
    myChart = new Chart(ctxC, {
        type: 'doughnut',
        data: {
            datasets: [{ data: expenses.map(e => e.uzs), backgroundColor: ['#fff','#555','#aaa','#222'] }]
        },
        options: { cutout: '70%' }
    });
}

function del(i) {
    expenses.splice(i,1);
    const user = JSON.parse(localStorage.getItem("vipUser"));
    localStorage.setItem("ex_"+user.id, JSON.stringify(expenses));
    render();
}

function logout() { localStorage.clear(); location.reload(); }

initApp();
</script>
</body>
</html>
