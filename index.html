<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro V12</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00ff88; --error: #ff4d4d; --bg: #0f172a; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Outfit', sans-serif; }

        body { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: var(--bg); color: white; overflow: hidden;
        }

        .card {
            width: 90%; max-width: 400px; padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px); border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { color: var(--neon); margin-bottom: 20px; font-weight: 900; }

        input, select {
            width: 100%; padding: 15px; margin: 10px 0;
            background: rgba(0,0,0,0.2); border: 2px solid transparent;
            border-radius: 15px; color: white; outline: none; transition: 0.3s;
        }
        
        /* Xato bo'lganda qizil qilish */
        input.invalid { border-color: var(--error); box-shadow: 0 0 10px rgba(255, 77, 77, 0.2); }
        input:focus { border-color: var(--neon); }

        button {
            width: 100%; padding: 15px; background: var(--neon);
            color: #064e3b; border: none; border-radius: 15px;
            font-weight: 900; cursor: pointer; margin-top: 10px;
        }

        .chart-container { width: 200px; height: 200px; margin: 0 auto 20px; position: relative; }
        #total-display { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 18px; font-weight: 900; color: var(--neon);
        }

        #history { max-height: 120px; overflow-y: auto; margin-top: 15px; }
        .row { 
            display: flex; justify-content: space-between; padding: 10px;
            background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 5px;
            font-size: 14px; border-left: 3px solid var(--neon);
        }

        .lang-box { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .lang-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 4px 10px; border-radius: 8px; cursor: pointer; font-size: 10px; }
        .lang-btn.active { background: var(--neon); color: black; border: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="lang-box">
        <button class="lang-btn active" onclick="setLang('uz')">UZ</button>
        <button class="lang-btn" onclick="setLang('ru')">RU</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>

    <!-- 1. LOGIN -->
    <div id="step-login">
        <h1>KIRISH</h1>
        <div id="tg-widget" style="display: flex; justify-content: center;"></div>
    </div>

    <!-- 2. SETUP -->
    <div id="step-setup" style="display:none;">
        <h1 id="t-setup">PROFIL</h1>
        <input type="text" id="fname" placeholder="Ism" onkeydown="move(event, 'lname')">
        <input type="text" id="lname" placeholder="Familiya" onkeydown="move(event, 'phone')">
        <input type="tel" id="phone" placeholder="+998XXXXXXXXX" onkeydown="move(event, 'btn-save')">
        <button id="btn-save" onclick="handleSave()">SAQLASH ✅</button>
    </div>

    <!-- 3. MAIN -->
    <div id="step-main" style="display:none;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span id="user-display" style="font-weight: 600; color: var(--neon);"></span>
            <span onclick="resetApp()" style="cursor: pointer; opacity: 0.5; font-size: 12px;">CHIQISH</span>
        </div>

        <div class="chart-container">
            <canvas id="chartCanvas"></canvas>
            <div id="total-display">0</div>
        </div>

        <input type="text" id="ex-name" placeholder="Nima xarid?" onkeydown="move(event, 'ex-val')">
        <div style="display: flex; gap: 10px;">
            <input type="number" id="ex-val" placeholder="Summa" onkeydown="move(event, 'btn-add')">
            <select id="ex-curr" style="width: 100px;">
                <option value="UZS">UZS</option>
                <option value="USD">USD</option>
            </select>
        </div>
        <button id="btn-add" onclick="handleAdd()">QO'SHISH +</button>
        <div id="history"></div>
    </div>
</div>

<script>
    const BOT_TOKEN = "8234703203:AAEag9x1fDNj7mg1okyzpycfiXmsG_zVwas";
    const ADMIN_ID = "6438145042";
    let currentUser = null, items = [], myChart = null, usdRate = 12850;

    // 1. Enter bilan o'tish
    function move(e, nextId) {
        if(e.key === 'Enter') {
            e.preventDefault();
            const el = document.getElementById(nextId);
            if(el.tagName === 'BUTTON') el.click();
            else el.focus();
        }
    }

    // 2. Telegram Vidjet
    function loadWidget() {
        const script = document.createElement('script');
        script.src = "https://telegram.org/js/telegram-widget.js?22";
        script.setAttribute('data-telegram-login', 'ibo_aka_bot');
        script.setAttribute('data-size', 'large');
        script.setAttribute('data-onauth', 'onAuth(user)');
        document.getElementById('tg-widget').appendChild(script);
    }

    function onAuth(user) {
        currentUser = user;
        document.getElementById('step-login').style.display = 'none';
        document.getElementById('step-setup').style.display = 'block';
        document.getElementById('fname').focus();
    }

    // 3. Saqlash va Telegramga yuborish
    async function handleSave() {
        const f = document.getElementById('fname'), l = document.getElementById('lname'), p = document.getElementById('phone');
        let isErr = false;

        [f, l, p].forEach(el => {
            if(!el.value || (el.id === 'phone' && el.value.length < 9)) {
                el.classList.add('invalid');
                isErr = true;
            } else {
                el.classList.remove('invalid');
            }
        });

        if(isErr) return;

        const msg = `🆕 **YANGI FOYDALANUVCHI**\n\n👤 Ism: ${f.value}\n👤 Familiya: ${l.value}\n📞 Tel: ${p.value}\n\n🆔 TG ID: ${currentUser ? currentUser.id : 'Noma\'lum'}\n👤 User: @${currentUser ? (currentUser.username || 'yoq') : 'yoq'}`;

        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: ADMIN_ID, text: msg, parse_mode: 'Markdown' })
        });

        localStorage.setItem('user_v12', JSON.stringify({f: f.value, l: l.value, id: currentUser ? currentUser.id : Date.now()}));
        location.reload();
    }

    // 4. Kursni olish
    async function getRate() {
        try {
            const r = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/');
            const d = await r.json();
            usdRate = parseFloat(d.find(x => x.code === "USD").Rate);
        } catch(e) { console.log("Rate error"); }
    }

    // 5. Xarajat qo'shish
    function handleAdd() {
        const n = document.getElementById('ex-name'), v = document.getElementById('ex-val'), c = document.getElementById('ex-curr').value;
        if(!n.value) return n.classList.add('invalid');
        if(!v.value) return v.classList.add('invalid');

        n.classList.remove('invalid'); v.classList.remove('invalid');

        const uzsAmount = (c === 'USD') ? (v.value * usdRate) : Number(v.value);
        items.push({ name: n.value, val: v.value, curr: c, uzs: uzsAmount });
        
        localStorage.setItem('data_v12_'+JSON.parse(localStorage.getItem('user_v12')).id, JSON.stringify(items));
        n.value = ''; v.value = '';
        render();
        confetti({ particleCount: 50, spread: 60, colors: ['#00ff88', '#ffffff'] });
        n.focus();
    }

    // 6. Grafik va Listni chizish
    function render() {
        const list = document.getElementById('history');
        list.innerHTML = '';
        let total = 0;
        
        items.slice().reverse().forEach(i => {
            total += i.uzs;
            list.innerHTML += `<div class="row"><span>${i.name}</span><b>${Number(i.val).toLocaleString()} ${i.curr}</b></div>`;
        });

        document.getElementById('total-display').innerText = Math.round(total).toLocaleString();

        const ctx = document.getElementById('chartCanvas').getContext('2d');
        if(myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: items.length ? items.map(x => x.uzs) : [1],
                    backgroundColor: ['#00ff88', '#f43f5e', '#fbbf24', '#3b82f6', '#a855f7', '#ec4899'],
                    borderWidth: 0,
                    hoverOffset: 10
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });
    }

    // 7. Til sozlamalari
    function setLang(l) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText === l.toUpperCase()));
        // Til o'zgarishini shu yerda kengaytirish mumkin
    }

    // 8. Boshlash
    function init() {
        loadWidget();
        getRate();
        const savedUser = localStorage.getItem('user_v12');
        if(savedUser) {
            const u = JSON.parse(savedUser);
            document.getElementById('step-login').style.display = 'none';
            document.getElementById('step-main').style.display = 'block';
            document.getElementById('user-display').innerText = `${u.f} ${u.l}`.toUpperCase();
            items = JSON.parse(localStorage.getItem('data_v12_'+u.id) || "[]");
            render();
        }
    }

    function resetApp() { localStorage.clear(); location.reload(); }

    init();
</script>
</body>
</html>
