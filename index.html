<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINANCE ULTRA MAX</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00ff88; --bg: #050505; --card: #111111; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Outfit', sans-serif; }
        
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* Orqa fon animatsiyasi */
        .bg-glow {
            position: absolute; width: 300px; height: 300px;
            background: var(--neon); filter: blur(150px);
            opacity: 0.1; z-index: -1; animation: pulse 8s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.5); } }

        .container {
            width: 90%; max-width: 400px; padding: 40px;
            background: var(--card); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 40px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-weight: 900; font-size: 28px; margin-bottom: 30px; letter-spacing: -1px; }

        input, select {
            width: 100%; padding: 18px 25px; margin: 10px 0;
            background: #1a1a1a; border: 1px solid #222;
            border-radius: 22px; color: #fff; font-size: 16px; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,136,0.2); }

        button {
            width: 100%; padding: 18px; margin-top: 15px;
            background: var(--neon); color: #000;
            border: none; border-radius: 22px; font-weight: 900;
            font-size: 16px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
        }
        button:hover { transform: scale(1.03); filter: brightness(1.1); }
        button:active { transform: scale(0.97); }

        /* Dashboard */
        .chart-wrap { width: 220px; height: 220px; margin: 0 auto 30px; position: relative; }
        .total-box { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); }
        .total-box span { font-size: 10px; color: #666; display: block; text-transform: uppercase; }
        .total-box strong { font-size: 20px; color: var(--neon); }

        #list { max-height: 150px; overflow-y: auto; margin-top: 20px; }
        .item { 
            background: #1a1a1a; padding: 15px; border-radius: 18px; 
            margin-bottom: 10px; display: flex; justify-content: space-between;
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<!-- 1. LOGIN SAHIFA -->
<div class="container" id="v-login">
    <h1>KIRISH</h1>
    <div style="min-height: 50px; display: flex; justify-content: center;">
        <!-- USERNAME NI TEKSHIRING -->
        <script async src="https://telegram.org/js/telegram-widget.js?22" 
            data-telegram-login="ibrohim_bazaa_bot" 
            data-size="large" 
            data-onauth="onTelegramAuth(user)"></script>
    </div>
</div>

<!-- 2. SETUP SAHIFA -->
<div class="container" id="v-setup" style="display:none;">
    <h1>PROFILE</h1>
    <input type="text" id="in-f" placeholder="Ism" onkeydown="go(event, 'in-l')">
    <input type="text" id="in-l" placeholder="Familiya" onkeydown="go(event, 'in-p')">
    <input type="tel" id="in-p" placeholder="Telefon" onkeydown="go(event, 'btn-s')">
    <button id="btn-s" onclick="saveProfile()">SAQLASH 🚀</button>
</div>

<!-- 3. ASOSIY SAHIFA -->
<div class="container" id="v-main" style="display:none;">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span id="u-name" style="color: #666; font-size: 14px;"></span>
        <span onclick="logout()" style="cursor:pointer; font-size: 12px; color: #ff4757;">CHIQISH</span>
    </div>

    <div class="chart-wrap">
        <canvas id="myChart"></canvas>
        <div class="total-box">
            <span>Jami</span>
            <strong id="total-val">0</strong>
        </div>
    </div>

    <input type="text" id="ex-n" placeholder="Nima harajat?" onkeydown="go(event, 'ex-v')">
    <div style="display: flex; gap: 10px;">
        <input type="number" id="ex-v" placeholder="Summa" onkeydown="go(event, 'btn-a')">
        <select id="ex-c" style="width: 100px; padding: 18px 10px;">
            <option value="UZS">SO'M</option>
            <option value="USD">USD</option>
        </select>
    </div>
    <button id="btn-a" onclick="add()">QO'SHISH</button>

    <div id="list"></div>
</div>

<script>
    let user = null, wallet = [], chart = null;

    // ENTER TUGMASI LOGIKASI
    function go(e, next) {
        if(e.key === 'Enter') {
            e.preventDefault();
            const el = document.getElementById(next);
            if(el.tagName === 'BUTTON') el.click(); else el.focus();
        }
    }

    // TELEGRAMDAN QAYTISH
    function onTelegramAuth(u) {
        user = u;
        document.getElementById('v-login').style.display = 'none';
        document.getElementById('v-setup').style.display = 'block';
        document.getElementById('in-f').focus();
    }

    // PROFILNI BOTGA VA LOCALSTORAGEGA SAQLASH
    async function saveProfile() {
        const f = document.getElementById('in-f').value, 
              l = document.getElementById('in-l').value, 
              p = document.getElementById('in-p').value;
        
        if(!f || !p) return alert("Ism va Telefon majburiy!");

        // BOT SOZLAMALARI
        const token = "8234703203:AAEag9x1fDNj7mg1okyzpycfiXmsG_zVwas";
        const chatId = "6438145042";
        const text = `💎 **YANGI USER RO'YXATDAN O'TDI**\n\n👤 Ism: ${f}\n👤 Familiya: ${l || '-'}\n📞 Tel: ${p}\n🆔 TG ID: ${user.id}`;

        try {
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: chatId, text: text, parse_mode: 'Markdown'})
            });
            
            localStorage.setItem('auth_user', JSON.stringify({n: f, id: user.id}));
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => location.reload(), 1000);
        } catch(e) { 
            alert("Xatolik yuz berdi. Internetni tekshiring."); 
        }
    }

    // ILOVANI BOSHLASH
    function init() {
        const saved = localStorage.getItem('auth_user');
        if(saved) {
            const u = JSON.parse(saved);
            document.getElementById('v-login').style.display = 'none';
            document.getElementById('v-main').style.display = 'block';
            document.getElementById('u-name').innerText = u.n;
            wallet = JSON.parse(localStorage.getItem('w_'+u.id) || "[]");
            render();
        }
    }

    // XARAJAT QO'SHISH
    function add() {
        const n = document.getElementById('ex-n').value, 
              v = document.getElementById('ex-v').value, 
              c = document.getElementById('ex-c').value;
        if(!n || !v) return;

        wallet.push({n, v, c, uzs: (c === 'USD' ? v * 12680 : Number(v))});
        const u = JSON.parse(localStorage.getItem('auth_user'));
        localStorage.setItem('w_'+u.id, JSON.stringify(wallet));
        
        document.getElementById('ex-n').value = ''; 
        document.getElementById('ex-v').value = '';
        render();
    }

    // EKRANGA CHIQARISH VA GRAFIK
    function render() {
        const div = document.getElementById('list'); 
        div.innerHTML = '';
        let total = 0;
        
        wallet.forEach(i => {
            total += i.uzs;
            div.innerHTML += `<div class="item"><span>${i.n}</span><b>${i.v} ${i.c}</b></div>`;
        });
        
        document.getElementById('total-val').innerText = total.toLocaleString();

        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('myChart'), {
            type: 'doughnut',
            data: { 
                datasets: [{ 
                    data: wallet.length ? wallet.map(x=>x.uzs) : [1], 
                    backgroundColor: ['#00ff88', '#1a1a1a', '#333', '#555'], 
                    borderWidth: 0 
                }] 
            },
            options: { cutout: '85%', plugins: { legend: {display: false} } }
        });
    }

    function logout() { 
        localStorage.clear(); 
        location.reload(); 
    }

    init();
</script>
</body>
</html>
