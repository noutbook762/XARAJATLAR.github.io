<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro V14</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00ff88; --error: #ff4d4d; --bg: #0f172a; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Outfit', sans-serif; }
        body { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); color: white; overflow: hidden; }
        .card { width: 92%; max-width: 400px; padding: 25px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: var(--neon); margin-bottom: 20px; font-weight: 900; text-transform: uppercase; }
        input, select { width: 100%; padding: 15px; margin: 8px 0; background: rgba(0,0,0,0.3); border: 2px solid transparent; border-radius: 15px; color: white; outline: none; transition: 0.3s; }
        input.invalid { border-color: var(--error); box-shadow: 0 0 10px rgba(255, 77, 77, 0.2); }
        input:focus { border-color: var(--neon); }
        button { width: 100%; padding: 15px; background: var(--neon); color: #064e3b; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .chart-container { width: 170px; height: 170px; margin: 0 auto 15px; position: relative; }
        #total-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; font-weight: 900; color: var(--neon); }
        #history { max-height: 100px; overflow-y: auto; margin-top: 15px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 8px; font-size: 13px; border-left: 4px solid var(--neon); }
        .del-btn { color: var(--error); font-weight: bold; cursor: pointer; margin-left: 12px; font-size: 20px; line-height: 1; }
        .lang-box { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .lang-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-size: 11px; transition: 0.3s; }
        .lang-btn.active { background: var(--neon); color: black; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="lang-box">
        <button class="lang-btn active" onclick="updateLang('uz')">UZ</button>
        <button class="lang-btn" onclick="updateLang('ru')">RU</button>
        <button class="lang-btn" onclick="updateLang('en')">EN</button>
    </div>

    <!-- 1. LOGIN SECTION -->
    <div id="step-login">
        <h1 data-tr="login_title">KIRISH</h1>
        <div id="tg-widget" style="display: flex; justify-content: center;"></div>
    </div>

    <!-- 2. SETUP SECTION -->
    <div id="step-setup" style="display:none;">
        <h1 data-tr="profile_title">PROFIL</h1>
        <input type="text" id="fname" data-ph="ph_name">
        <input type="text" id="lname" data-ph="ph_last">
        <input type="tel" id="phone" data-ph="ph_tel">
        <button id="btn-save" onclick="handleSave()" data-tr="save_btn">SAQLASH ✅</button>
    </div>

    <!-- 3. MAIN DASHBOARD -->
    <div id="step-main" style="display:none;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center;">
            <span id="user-display" style="font-weight: 600; color: var(--neon); font-size: 14px;"></span>
            <span onclick="resetApp()" style="cursor: pointer; opacity: 0.5; font-size: 11px; border-bottom: 1px solid;" data-tr="logout">CHIQISH</span>
        </div>

        <div class="chart-container">
            <canvas id="chartCanvas"></canvas>
            <div id="total-display">0</div>
        </div>

        <input type="text" id="ex-name" data-ph="ex_ph" onkeydown="move(event, 'ex-val')">
        <div style="display: flex; gap: 8px;">
            <input type="number" id="ex-val" data-ph="sum_ph" onkeydown="move(event, 'btn-add')">
            <select id="ex-curr" style="width: 85px;">
                <option value="UZS">UZS</option>
                <option value="USD">USD</option>
            </select>
        </div>
        <button id="btn-add" onclick="handleAdd()" data-tr="add_btn">QO'SHISH +</button>
        <div id="history"></div>
    </div>
</div>

<script>
    const BOT_TOKEN = "8234703203:AAEag9x1fDNj7mg1okyzpycfiXmsG_zVwas";
    const ADMIN_ID = "6438145042";
    
    let curLang = 'uz', tgUser = null, wallet = [], myChart = null, usdRate = 12850;

    const translations = {
        uz: { login_title: "KIRISH", profile_title: "PROFIL", save_btn: "SAQLASH ✅", logout: "CHIQISH", add_btn: "QO'SHISH +", ex_ph: "Nima xarid?", sum_ph: "Summa", ph_name: "Ism", ph_last: "Familiya", ph_tel: "+998XXXXXXXXX" },
        ru: { login_title: "ВХОД", profile_title: "ПРОФИЛЬ", save_btn: "СОХРАНИТЬ ✅", logout: "ВЫХОД", add_btn: "ДОБАВИТЬ +", ex_ph: "Что купили?", sum_ph: "Сумма", ph_name: "Имя", ph_last: "Фамилия", ph_tel: "+998XXXXXXXXX" },
        en: { login_title: "LOGIN", profile_title: "PROFILE", save_btn: "SAVE ✅", logout: "LOGOUT", add_btn: "ADD +", ex_ph: "Expense name", sum_ph: "Amount", ph_name: "Name", ph_last: "Lastname", ph_tel: "+998XXXXXXXXX" }
    };

    function updateLang(lang) {
        curLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText === lang.toUpperCase()));
        
        // Matnlarni tarjima qilish
        document.querySelectorAll('[data-tr]').forEach(el => {
            el.innerText = translations[lang][el.getAttribute('data-tr')];
        });

        // Placeholderlarni tarjima qilish
        document.querySelectorAll('[data-ph]').forEach(el => {
            el.placeholder = translations[lang][el.getAttribute('data-ph')];
        });
    }

    function move(e, next) {
        if(e.key === 'Enter') {
            e.preventDefault();
            const el = document.getElementById(next);
            if(el.tagName === 'BUTTON') el.click(); else el.focus();
        }
    }

    function onAuth(user) {
        tgUser = user;
        document.getElementById('step-login').style.display = 'none';
        document.getElementById('step-setup').style.display = 'block';
        document.getElementById('fname').focus();
    }

    async function handleSave() {
        const f = document.getElementById('fname'), l = document.getElementById('lname'), p = document.getElementById('phone');
        if(!f.value || !l.value || p.value.length < 9) {
            [f, l, p].forEach(x => !x.value ? x.classList.add('invalid') : x.classList.remove('invalid'));
            return;
        }

        const msg = `👤 **YANGI USER**\n\n📌 Ism: ${f.value}\n📌 Familiya: ${l.value}\n📞 Tel: ${p.value}\n🆔 ID: ${tgUser ? tgUser.id : 'N/A'}\n👤 User: @${tgUser ? (tgUser.username || 'yoq') : 'yoq'}`;

        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: ADMIN_ID, text: msg, parse_mode: 'Markdown' })
        });

        localStorage.setItem('user_v14', JSON.stringify({f: f.value, l: l.value, id: tgUser ? tgUser.id : Date.now()}));
        location.reload();
    }

    function handleAdd() {
        const n = document.getElementById('ex-name'), v = document.getElementById('ex-val'), c = document.getElementById('ex-curr').value;
        if(!n.value || !v.value) {
            n.classList.toggle('invalid', !n.value);
            v.classList.toggle('invalid', !v.value);
            return;
        }

        const uzsAmount = (c === 'USD') ? (v.value * usdRate) : Number(v.value);
        wallet.push({ id: Date.now(), n: n.value, v: v.value, c, uzs: uzsAmount });
        
        saveWallet();
        n.value = ''; v.value = '';
        render();
        confetti({ particleCount: 30, spread: 60, origin: { y: 0.8 } });
        n.focus();
    }

    function deleteItem(id) {
        wallet = wallet.filter(i => i.id !== id);
        saveWallet();
        render();
    }

    function saveWallet() {
        const u = JSON.parse(localStorage.getItem('user_v14'));
        localStorage.setItem('w_v14_'+u.id, JSON.stringify(wallet));
    }

    function render() {
        const list = document.getElementById('history');
        list.innerHTML = '';
        let total = 0;
        
        wallet.slice().reverse().forEach(i => {
            total += i.uzs;
            list.innerHTML += `
                <div class="row">
                    <span>${i.n}</span>
                    <div style="display:flex; align-items:center;">
                        <b>${Number(i.v).toLocaleString()} ${i.c}</b>
                        <span class="del-btn" onclick="deleteItem(${i.id})">×</span>
                    </div>
                </div>`;
        });

        document.getElementById('total-display').innerText = Math.round(total).toLocaleString();

        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('chartCanvas'), {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: wallet.length ? wallet.map(x => x.uzs) : [1],
                    backgroundColor: ['#00ff88', '#ff3366', '#ffcc00', '#3399ff', '#cc33ff', '#ff6600'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '80%', plugins: { legend: { display: false } } }
        });
    }

    function init() {
        updateLang('uz');
        
        // TG Login Widget
        const script = document.createElement('script');
        script.src = "https://telegram.org/js/telegram-widget.js?22";
        script.setAttribute('data-telegram-login', 'ibo_aka_bot');
        script.setAttribute('data-size', 'large');
        script.setAttribute('data-onauth', 'onAuth(user)');
        document.getElementById('tg-widget').appendChild(script);

        const savedUser = localStorage.getItem('user_v14');
        if(savedUser) {
            const u = JSON.parse(savedUser);
            document.getElementById('step-login').style.display = 'none';
            document.getElementById('step-main').style.display = 'block';
            document.getElementById('user-display').innerText = `${u.f} ${u.l}`.toUpperCase();
            wallet = JSON.parse(localStorage.getItem('w_v14_'+u.id) || "[]");
            render();
        }
    }

    function resetApp() { localStorage.clear(); location.reload(); }
    init();
</script>
</body>
</html>
