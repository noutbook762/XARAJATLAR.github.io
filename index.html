<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro V40 | Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --s: #a855f7; --bg: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        /* Haqiqiy harakatlanuvchi fon */
        body { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(45deg, #0f172a, #1e1b4b, #581c87, #1e1b4b);
            background-size: 400% 400%; animation: gradientBG 10s ease infinite;
            color: white; overflow: hidden; 
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .card { 
            width: 92%; max-width: 400px; padding: 25px; 
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(30px); 
            border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 20px 60px rgba(0,0,0,0.6); 
        }

        h1 { font-weight: 900; margin-bottom: 15px; text-align: center; letter-spacing: -1px; }

        input, select { 
            width: 100%; padding: 15px; margin: 6px 0; 
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 15px; color: white; outline: none; transition: 0.3s; font-size: 15px;
        }
        input:focus, select:focus { border-color: var(--p); background: rgba(0, 0, 0, 0.5); }
        
        /* Select uchun maxsus stil */
        select option { background: #1e1b4b; color: white; }

        .row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 8px; }
        
        button { 
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--p), var(--s)); 
            border: none; border-radius: 15px; color: white; font-weight: 900; cursor: pointer; 
            margin-top: 10px; transition: 0.3s; transform: perspective(1px) translateZ(0);
        }
        button:active { transform: scale(0.97); }

        .langs { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .l-btn { cursor: pointer; opacity: 0.3; font-weight: 900; transition: 0.4s; }
        .l-btn.active { opacity: 1; color: var(--p); transform: translateY(-3px); }

        .user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 5px; }
        .edit-icon { width: 22px; cursor: pointer; filter: drop-shadow(0 0 5px var(--p)); }

        .chart-box { position: relative; width: 130px; height: 130px; margin: 0 auto 15px; }
        #total-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-weight: 900; }

        #history { max-height: 110px; overflow-y: auto; margin-top: 10px; padding-right: 5px; }
        #history::-webkit-scrollbar { width: 4px; }
        #history::-webkit-scrollbar-thumb { background: var(--b); border-radius: 10px; }

        .item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: rgba(255,255,255,0.06); 
            border-radius: 12px; margin-bottom: 6px; font-size: 14px; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity:0; transform: translateX(-10px); } to { opacity:1; transform: translateX(0); } }
        .del-btn { color: #f87171; font-weight: 900; cursor: pointer; padding: 5px; }
        
        .empty-state { text-align: center; opacity: 0.4; font-size: 13px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="langs">
        <span class="l-btn active" onclick="setLang('uz')">UZ</span>
        <span class="l-btn" onclick="setLang('ru')">RU</span>
        <span class="l-btn" onclick="setLang('en')">EN</span>
    </div>

    <!-- STEP 1: Login -->
    <div id="s1">
        <h1 id="t-login">KIRISH</h1>
        <div id="tg-widget" style="display:flex; justify-content:center;"></div>
    </div>

    <!-- STEP 2: Profile -->
    <div id="s2" style="display:none;">
        <h1 id="t-prof">PROFIL</h1>
        <input type="text" id="fn" onkeydown="chain(event, 'ln')">
        <input type="text" id="ln" onkeydown="chain(event, 'tel')">
        <input type="tel" id="tel" value="+998 " oninput="mask(this)" onkeydown="if(event.key==='Enter') saveUser()">
        <button onclick="saveUser()" id="b-save">SAQLASH</button>
    </div>

    <!-- STEP 3: Dashboard -->
    <div id="s3" style="display:none;">
        <div class="user-bar">
            <div>
                <img src="https://img.icons8.com/ios-filled/50/ffffff/settings.png" class="edit-icon" onclick="editMode()">
                <b id="u-name"></b>
            </div>
            <span onclick="logout()" style="cursor:pointer; opacity:0.6; font-size:11px; font-weight:900;">EXIT</span>
        </div>

        <div class="chart-box">
            <canvas id="myChart"></canvas>
            <div id="total-val">0<br><small>UZS</small></div>
        </div>

        <input type="text" id="ex-n" onkeydown="chain(event, 'ex-v')">
        <div class="row">
            <input type="number" id="ex-v" onkeydown="if(event.key==='Enter') addEx()">
            <select id="ex-c">
                <option value="UZS">UZS</option>
                <option value="USD">USD</option>
            </select>
        </div>
        <button onclick="addEx()" id="b-add">QO'SHISH</button>
        <div id="history"></div>
    </div>
</div>

<script>
    const BOT_TOKEN = "8234703203:AAEag9x1fDNj7mg1okyzpycfiXmsG_zVwas", ADMIN_ID = "6438145042";
    let curL = 'uz', items = [], chart = null, rate = 12850, user = null;

    const dict = {
        uz: { login:"KIRISH", prof:"PROFIL", save:"SAQLASH ✅", add:"QO'SHISH +", fn:"Ismingiz", ln:"Familiyangiz", ex:"Xarajat nomi", sum:"Summa", empty: "Hali xarajatlar yo'q", confirm: "Chiqasizmi?" },
        ru: { login:"ВХОД", prof:"ПРОФИЛЬ", save:"СОХРАНИТЬ ✅", add:"ДОБАВИТЬ +", fn:"Имя", ln:"Фамилия", ex:"Название расхода", sum:"Сумма", empty: "Расходов пока нет", confirm: "Выйти?" },
        en: { login:"LOGIN", prof:"PROFILE", save:"SAVE ✅", add:"ADD +", fn:"First Name", ln:"Last Name", ex:"Expense Name", sum:"Amount", empty: "No expenses yet", confirm: "Logout?" }
    };

    function setLang(l) {
        curL = l;
        document.querySelectorAll('.l-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === l));
        document.getElementById('t-login').innerText = dict[l].login;
        document.getElementById('t-prof').innerText = dict[l].prof;
        document.getElementById('b-save').innerText = dict[l].save;
        document.getElementById('b-add').innerText = dict[l].add;
        document.getElementById('fn').placeholder = dict[l].fn;
        document.getElementById('ln').placeholder = dict[l].ln;
        document.getElementById('ex-n').placeholder = dict[l].ex;
        document.getElementById('ex-v').placeholder = dict[l].sum;
        if(user) render();
    }

    function chain(e, nextId) { if(e.key === 'Enter') document.getElementById(nextId).focus(); }

    function mask(i) {
        if (!i.value.startsWith("+998 ")) i.value = "+998 ";
        let v = i.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,2})(\d{0,3})(\d{0,2})(\d{0,2})/);
        i.value = !v[2] ? "+998 " : "+998 (" + v[2] + (v[3] ? ") " + v[3] : "") + (v[4] ? "-" + v[4] : "") + (v[5] ? "-" + v[5] : "");
    }

    function onTelegramAuth(u) { user = u; document.getElementById('s1').style.display='none'; document.getElementById('s2').style.display='block'; }

    async function saveUser() {
        const f = document.getElementById('fn').value, l = document.getElementById('ln').value, p = document.getElementById('tel').value;
        if(!f || !l || p.length < 18) return alert("To'liq to'ldiring!");
        const data = {f, l, p, id: user?.id || Date.now()};
        localStorage.setItem('f_user', JSON.stringify(data));
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent("User: "+f+" "+l+"\nTel: "+p)}`);
        location.reload();
    }

    function addEx() {
        const n = document.getElementById('ex-n'), v = document.getElementById('ex-v'), c = document.getElementById('ex-c').value;
        if(!n.value || !v.value) return;
        items.push({ id: Date.now(), n: n.value, v: Number(v.value), c, uzs: c==='USD'?v.value*rate:v.value });
        localStorage.setItem('f_items_'+user.id, JSON.stringify(items));
        render(); n.value = ''; v.value = ''; n.focus();
        confetti({particleCount: 50, spread: 70, origin: { y: 0.8 }, colors: ['#6366f1', '#a855f7']});
    }

    function render() {
        const h = document.getElementById('history'); h.innerHTML = ''; let t = 0;
        if(items.length === 0) { h.innerHTML = `<div class="empty-state">--- ${dict[curL].empty} ---</div>`; }
        items.slice().reverse().forEach(x => {
            t += Number(x.uzs);
            h.innerHTML += `<div class="item"><span>${x.n}</span><b>${x.c==='USD'?'$':''}${Number(x.v).toLocaleString()}</b><span class="del-btn" onclick="del(${x.id})">×</span></div>`;
        });
        document.getElementById('total-val').innerHTML = `${Math.round(t).toLocaleString()}<br><small>UZS</small>`;
        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('myChart'), { 
            type: 'doughnut', 
            data: { datasets: [{ data: items.length ? items.map(x => x.uzs) : [1], backgroundColor: ['#6366f1', '#a855f7', '#ec4899', '#f59e0b', '#10b981'], borderWidth: 0, cutout: '80%' }] },
            options: { plugins: { legend: { display: false } }, animation: { animateScale: true } }
        });
    }

    function del(id) { items = items.filter(x => x.id !== id); localStorage.setItem('f_items_'+user.id, JSON.stringify(items)); render(); }
    function editMode() { const u = JSON.parse(localStorage.getItem('f_user')); document.getElementById('s3').style.display='none'; document.getElementById('s2').style.display='block'; document.getElementById('fn').value=u.f; document.getElementById('ln').value=u.l; }
    function logout() { if(confirm(dict[curL].confirm)) { localStorage.clear(); location.reload(); } }

    window.onload = async () => {
        setLang('uz');
        try { const r = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/'); const d = await r.json(); rate = parseFloat(d.find(x => x.Ccy === 'USD').Rate); } catch(e) {}
        const saved = localStorage.getItem('f_user');
        if(saved) {
            user = JSON.parse(saved); document.getElementById('s1').style.display='none'; document.getElementById('s3').style.display='block';
            document.getElementById('u-name').innerText = user.f;
            items = JSON.parse(localStorage.getItem('f_items_'+user.id) || "[]"); render();
        } else {
            const s = document.createElement('script'); s.src = "https://telegram.org/js/telegram-widget.js?22";
            s.setAttribute('data-telegram-login', 'ibo_aka_bot'); s.setAttribute('data-onauth', 'onTelegramAuth(user)');
            document.getElementById('tg-widget').appendChild(s);
        }
    };
</script>
</body>
</html>
