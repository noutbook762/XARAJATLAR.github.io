<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XARAJATLAR</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --s: #a855f7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #4c1d95, #1e1b4b);
            background-size: 400% 400%; animation: moveBG 10s ease infinite; color: white; overflow: hidden; 
        }
        @keyframes moveBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .card { 
            width: 92%; max-width: 400px; padding: 30px; background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(25px); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
        }
        .langs { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .l-btn { cursor: pointer; opacity: 0.3; font-weight: 900; transition: 0.3s; }
        .l-btn.active { opacity: 1; color: var(--p); transform: scale(1.1); }
        h1 { font-weight: 900; margin-bottom: 20px; text-align: center; letter-spacing: -1px; }
        input, select { 
            width: 100%; padding: 16px; margin: 8px 0; background: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 18px; color: white; outline: none; font-size: 16px;
        }
        input:focus { border-color: var(--p); background: rgba(0, 0, 0, 0.6); }
        select { background: var(--p) !important; border: none; font-weight: 900; cursor: pointer; color: white; }
        .row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; }
        button { 
            width: 100%; padding: 18px; background: linear-gradient(90deg, var(--p), var(--s)); 
            border: none; border-radius: 18px; color: white; font-weight: 900; cursor: pointer; margin-top: 10px; 
        }
        .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .chart-box { position: relative; width: 140px; height: 140px; margin: 0 auto 20px; }
        #total-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-weight: 900; }
        #history { max-height: 120px; overflow-y: auto; margin-top: 15px; }
        .item { display: flex; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 6px; }
        .del { color: #ff4d4d; cursor: pointer; font-weight: 900; }
        .empty-text { text-align: center; opacity: 0.4; font-size: 14px; padding: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="langs">
        <span class="l-btn active" onclick="setL('uz')">UZ</span>
        <span class="l-btn" onclick="setL('ru')">RU</span>
        <span class="l-btn" onclick="setL('en')">EN</span>
    </div>

    <div id="step1">
        <h1 id="h-login">KIRISH</h1>
        <div id="tg-widget" style="display:flex; justify-content:center;"></div>
    </div>

    <div id="step2" style="display:none;">
        <h1 id="h-prof">PROFIL</h1>
        <input type="text" id="fn" onkeydown="if(event.key==='Enter') document.getElementById('ln').focus()">
        <input type="text" id="ln" onkeydown="if(event.key==='Enter') document.getElementById('tel').focus()">
        <input type="tel" id="tel" value="+998 " 
               oninput="fixTel(this)" onfocus="moveCursor(this)" onclick="moveCursor(this)"
               onkeydown="if(event.key==='Enter') saveUsr()">
        <button onclick="saveUsr()" id="btn-save">SAQLASH</button>
    </div>

    <div id="step3" style="display:none;">
        <div class="user-header">
            <div>
                <img src="https://img.icons8.com/ios-glyphs/30/ffffff/settings--v1.png" style="width:20px; cursor:pointer;" onclick="goEdit()">
                <b id="u-display" style="margin-left:8px"></b>
            </div>
            <span onclick="exit()" id="t-exit" style="cursor:pointer; opacity:0.6; font-size:12px; font-weight:900; color:#f87171">CHIQISH</span>
        </div>
        <div class="chart-box">
            <canvas id="chrt"></canvas>
            <div id="total-val">0<br><small>UZS</small></div>
        </div>
        <input type="text" id="ex-n" onkeydown="if(event.key==='Enter') document.getElementById('ex-v').focus()">
        <div class="row">
            <input type="number" id="ex-v" onkeydown="if(event.key==='Enter') addEx()">
            <select id="ex-c"><option value="UZS">UZS</option><option value="USD">USD</option></select>
        </div>
        <button onclick="addEx()" id="btn-add">QO'SHISH</button>
        <div id="history"></div>
    </div>
</div>

<script>
    const BTN = "8234703203:AAEag9x1fDNj7mg1okyzpycfiXmsG_zVwas", ADM = "6438145042";
    let curL = 'uz', items = [], chart = null, rate = 12850, user = null;

    const langData = {
        uz: { log: "KIRISH", prf: "PROFIL", sav: "SAQLASH ✅", add: "QO'SHISH +", fn: "Ismingiz", ln: "Familiyangiz", ex: "Xarajat nomi", sum: "Summa", empty: "Hali xarajat yo'q", exit: "CHIQISH", conf: "Chiqasizmi?" },
        ru: { log: "ВХОД", prf: "ПРОФИЛЬ", sav: "СОХРАНИТЬ ✅", add: "ДОБАВИТЬ +", fn: "Имя", ln: "Фамилия", ex: "Название", sum: "Сумма", empty: "Список пуст", exit: "ВЫХОД", conf: "Выйти?" },
        en: { log: "LOGIN", prf: "PROFILE", sav: "SAVE ✅", add: "ADD +", fn: "First Name", ln: "Last Name", ex: "Title", sum: "Amount", empty: "No expenses yet", exit: "LOGOUT", conf: "Logout?" }
    };

    function setL(l) {
        curL = l;
        document.querySelectorAll('.l-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === l));
        document.getElementById('h-login').innerText = langData[l].log;
        document.getElementById('h-prof').innerText = langData[l].prf;
        document.getElementById('btn-save').innerText = langData[l].sav;
        document.getElementById('btn-add').innerText = langData[l].add;
        document.getElementById('fn').placeholder = langData[l].fn;
        document.getElementById('ln').placeholder = langData[l].ln;
        document.getElementById('ex-n').placeholder = langData[l].ex;
        document.getElementById('ex-v').placeholder = langData[l].sum;
        document.getElementById('t-exit').innerText = langData[l].exit;
        if(user) render();
    }

    function moveCursor(el) { setTimeout(() => { el.setSelectionRange(el.value.length, el.value.length); }, 1); }
    function fixTel(i) {
        if (!i.value.startsWith("+998 ")) i.value = "+998 ";
        let v = i.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,2})(\d{0,3})(\d{0,2})(\d{0,2})/);
        i.value = !v[2] ? "+998 " : "+998 (" + v[2] + (v[3] ? ") " + v[3] : "") + (v[4] ? "-" + v[4] : "") + (v[5] ? "-" + v[5] : "");
    }

    function onTelegramAuth(u) { user = u; document.getElementById('step1').style.display='none'; document.getElementById('step2').style.display='block'; }

    async function saveUsr() {
        const f = document.getElementById('fn').value, l = document.getElementById('ln').value, p = document.getElementById('tel').value;
        if(!f || !l || p.length < 18) return;

        const oldData = JSON.parse(localStorage.getItem('u_data'));
        let msg = "";
        const tgUser = user?.username ? `@${user.username}` : "Mavjud emas";
        const tgID = user?.id || "Noma'lum";

        if (oldData) {
            msg = `🔄 FOYDALANUVCHI MA'LUMOTLARNI O'ZGARTIRDI\n\n`;
            msg += `ID: ${tgID}\nUser: ${tgUser}\n\n`;
            msg += oldData.f !== f ? `Ism: ${oldData.f} -> ${f}\n` : `Ism: ${f}\n`;
            msg += oldData.l !== l ? `Fam: ${oldData.l} -> ${l}\n` : `Fam: ${l}\n`;
            msg += oldData.p !== p ? `Tel: ${oldData.p} -> ${p}\n` : `Tel: ${p}\n`;
        } else {
            msg = `🚀 YANGI FOYDALANUVCHI\n\nIsm: ${f}\nFam: ${l}\nTel: ${p}\nID: ${tgID}\nUser: ${tgUser}`;
        }

        user = {f, l, p, id: tgID, username: tgUser};
        localStorage.setItem('u_data', JSON.stringify(user));
        await fetch(`https://api.telegram.org/bot${BTN}/sendMessage?chat_id=${ADM}&text=${encodeURIComponent(msg)}`);
        location.reload();
    }

    function addEx() {
        const n = document.getElementById('ex-n'), v = document.getElementById('ex-v'), c = document.getElementById('ex-c').value;
        if(!n.value || !v.value) return;
        items.push({ id: Date.now(), n: n.value, v: Number(v.value), c, uzs: c==='USD'?v.value*rate:v.value });
        localStorage.setItem('u_items_'+user.id, JSON.stringify(items));
        render(); n.value = ''; v.value = ''; n.focus();
        confetti({particleCount: 40, spread: 60, origin: { y: 0.8 }});
    }

    function render() {
        const h = document.getElementById('history'); h.innerHTML = ''; let t = 0;
        if(items.length === 0) h.innerHTML = `<div class="empty-text">${langData[curL].empty}</div>`;
        items.slice().reverse().forEach(x => {
            t += Number(x.uzs);
            h.innerHTML += `<div class="item"><span>${x.n}</span><b>${x.c==='USD'?'$':''}${Number(x.v).toLocaleString()}</b><span class="del" onclick="del(${x.id})">×</span></div>`;
        });
        document.getElementById('total-val').innerHTML = `${Math.round(t).toLocaleString()}<br><small>UZS</small>`;
        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('chrt'), { 
            type: 'doughnut', data: { datasets: [{ data: items.length ? items.map(x => x.uzs) : [1], backgroundColor: ['#6366f1', '#a855f7', '#ec4899', '#f59e0b', '#10b981'], borderWidth: 0, cutout: '80%' }] },
            options: { plugins: { legend: { display: false } } }
        });
    }

    function del(id) { items = items.filter(x => x.id !== id); localStorage.setItem('u_items_'+user.id, JSON.stringify(items)); render(); }
    function goEdit() { 
        const u = JSON.parse(localStorage.getItem('u_data'));
        document.getElementById('fn').value = u.f;
        document.getElementById('ln').value = u.l;
        document.getElementById('tel').value = u.p;
        document.getElementById('step3').style.display='none'; 
        document.getElementById('step2').style.display='block'; 
    }
    function exit() { if(confirm(langData[curL].conf)) { localStorage.clear(); location.reload(); } }

    window.onload = async () => {
        setL('uz');
        try { const r = await fetch('https://cbu.uz/uz/arkhiv-kursov-valyut/json/'); const d = await r.json(); rate = parseFloat(d.find(x => x.Ccy === 'USD').Rate); } catch(e) {}
        const saved = localStorage.getItem('u_data');
        if(saved) {
            user = JSON.parse(saved); document.getElementById('step1').style.display = 'none'; document.getElementById('step3').style.display = 'block';
            document.getElementById('u-display').innerText = user.f;
            items = JSON.parse(localStorage.getItem('u_items_'+user.id) || "[]"); render();
        } else {
            const s = document.createElement('script'); s.src = "https://telegram.org/js/telegram-widget.js?22";
            s.setAttribute('data-telegram-login', 'ibo_aka_bot'); s.setAttribute('data-onauth', 'onTelegramAuth(user)');
            document.getElementById('tg-widget').appendChild(s);
        }
    };
</script>
</body>
</html>
