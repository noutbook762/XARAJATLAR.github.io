<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Pro V22 - Multi-Currency</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; --secondary: #a855f7; 
            --glass: rgba(255, 255, 255, 0.1); --border: rgba(255, 255, 255, 0.2); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: #0f172a; color: white; overflow: hidden; 
        }
        .card { 
            width: 90%; max-width: 420px; padding: 35px; background: var(--glass); 
            backdrop-filter: blur(30px); border-radius: 40px; border: 1px solid var(--border); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        h1 { font-weight: 900; font-size: 24px; margin-bottom: 20px; text-align: center; }
        
        input, select { 
            width: 100%; padding: 18px; margin: 10px 0; background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border); border-radius: 20px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); }

        .currency-row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
        
        button { 
            width: 100%; padding: 20px; background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border: none; border-radius: 20px; color: white; font-weight: 900; cursor: pointer; margin-top: 10px;
        }
        button:active { transform: scale(0.95); }

        #history { max-height: 150px; overflow-y: auto; margin-top: 20px; }
        .item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 18px; margin-bottom: 8px;
        }
        .symbol { font-weight: 900; color: var(--secondary); margin-right: 5px; }

        .lang-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; font-size: 14px; }
        .l-btn { cursor: pointer; opacity: 0.5; transition: 0.3s; font-weight: 600; }
        .l-btn.active { opacity: 1; color: var(--primary); transform: scale(1.2); }
    </style>
</head>
<body>

<div class="card">
    <div class="lang-bar">
        <span class="l-btn active" onclick="changeLang('uz')">UZB</span>
        <span class="l-btn" onclick="changeLang('ru')">RUS</span>
        <span class="l-btn" onclick="changeLang('en')">ENG</span>
    </div>

    <!-- AUTH SECTION -->
    <div id="auth-box">
        <h1 data-tr="h_login">KIRISH</h1>
        <div id="tg-widget-container" style="display:flex; justify-content:center;"></div>
    </div>

    <!-- PROFILE SECTION -->
    <div id="prof-box" style="display:none;">
        <h1 data-tr="h_prof">PROFIL</h1>
        <input type="text" id="fn" data-ph="p_fn" onkeydown="go(event, 'ln')">
        <input type="text" id="ln" data-ph="p_ln" onkeydown="go(event, 'tel')">
        <input type="tel" id="tel" value="+998 " oninput="phoneMask(this)" onkeydown="go(event, 'btn-save')">
        <button id="btn-save" onclick="saveUser()" data-tr="b_save">SAQLASH</button>
    </div>

    <!-- DASHBOARD SECTION -->
    <div id="dash-box" style="display:none;">
        <div style="display:flex; justify-content:space-between; font-size: 12px; margin-bottom: 15px;">
            <span id="welcome-user"></span>
            <span onclick="logout()" style="cursor:pointer; text-decoration:underline;" data-tr="b_out">CHIQISH</span>
        </div>
        
        <div style="height: 140px; margin-bottom: 20px;">
            <canvas id="myChart"></canvas>
        </div>

        <input type="text" id="ex-n" data-ph="p_ex" onkeydown="go(event, 'ex-v')">
        <div class="currency-row">
            <input type="number" id="ex-v" data-ph="p_sum" onkeydown="go(event, 'btn-add')">
            <select id="ex-curr">
                <option value="UZS">UZS (so'm)</option>
                <option value="USD">USD ($)</option>
            </select>
        </div>
        <button id="btn-add" onclick="addItem()" data-tr="b_add">QO'SHISH +</button>
        <div id="history"></div>
    </div>
</div>

<script>
    const BT = "8234703203:AAEag9x1fDNj7mg1okyzpycfiXmsG_zVwas";
    const AD = "6438145042";
    const RATE = 12850;
    let LANG = 'uz', USER = null, DATA = [], CHART = null;

    const DICT = {
        uz: { h_login: "KIRISH", h_prof: "PROFIL", b_save: "SAQLASH", b_out: "CHIQISH", b_add: "QO'SHISH", p_fn: "Ismingiz", p_ln: "Familiyangiz", p_ex: "Nima xarid?", p_sum: "Summa" },
        ru: { h_login: "ВХОД", h_prof: "ПРОФИЛЬ", b_save: "СОХРАНИТЬ", b_out: "ВЫХОД", b_add: "ДОБАВИТЬ", p_fn: "Имя", p_ln: "Фамилия", p_ex: "Что купили?", p_sum: "Сумма" },
        en: { h_login: "LOGIN", h_prof: "PROFILE", b_save: "SAVE", b_out: "LOGOUT", b_add: "ADD", p_fn: "Name", p_ln: "Lastname", p_ex: "Expense", p_sum: "Amount" }
    };

    function changeLang(l) {
        LANG = l;
        document.querySelectorAll('.l-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === l || (l==='uz' && b.innerText==='UZB') || (l==='ru' && b.innerText==='RUS') || (l==='en' && b.innerText==='ENG')));
        document.querySelectorAll('[data-tr]').forEach(el => el.innerText = DICT[l][el.getAttribute('data-tr')]);
        document.querySelectorAll('[data-ph]').forEach(el => el.placeholder = DICT[l][el.getAttribute('data-ph')]);
    }

    function phoneMask(i) {
        let v = i.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,2})(\d{0,3})(\d{0,2})(\d{0,2})/);
        i.value = !v[2] ? "+998 " : "+998 (" + v[2] + (v[3] ? ") " + v[3] : "") + (v[4] ? "-" + v[4] : "") + (v[5] ? "-" + v[5] : "");
    }

    function go(e, next) {
        if(e.key === 'Enter') {
            e.preventDefault();
            const el = document.getElementById(next);
            if(el.tagName === 'BUTTON') el.click(); else {
                el.focus();
                if(el.type !== 'number') setTimeout(() => el.selectionStart = el.selectionEnd = el.value.length, 0);
            }
        }
    }

    function onTelegramAuth(user) {
        USER = user;
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('prof-box').style.display = 'block';
    }

    async function saveUser() {
        const f = document.getElementById('fn').value, l = document.getElementById('ln').value, p = document.getElementById('tel').value;
        if(!f || !l || p.length < 18) return alert("To'liq to'ldiring!");

        const text = `💰 **YANGI FOYDALANUVCHI**\n\n👤 FIO: ${f} ${l}\n📞 Tel: ${p}\n🆔 ID: ${USER?.id}\n🔗 User: @${USER?.username || 'yoq'}`;
        await fetch(`https://api.telegram.org/bot${BT}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: AD, text: text, parse_mode: 'Markdown' })
        });

        localStorage.setItem('fpro_u', JSON.stringify({f, l, id: USER?.id}));
        location.reload();
    }

    function addItem() {
        const n = document.getElementById('ex-n'), v = document.getElementById('ex-v'), c = document.getElementById('ex-curr').value;
        if(!n.value || !v.value) return;

        const num = Number(v.value);
        const uzs = c === 'USD' ? num * RATE : num;
        
        DATA.push({ n: n.value, v: num, c: c, uzs: uzs });
        localStorage.setItem('fpro_d_' + JSON.parse(localStorage.getItem('fpro_u')).id, JSON.stringify(DATA));
        
        render();
        n.value = ''; v.value = ''; n.focus();
        confetti({ particleCount: 60, spread: 50, origin: {y: 0.8} });
    }

    function render() {
        const h = document.getElementById('history'); h.innerHTML = '';
        let total = 0;
        DATA.slice().reverse().forEach(x => {
            total += x.uzs;
            const sym = x.c === 'USD' ? '$' : 'S';
            h.innerHTML += `<div class="item"><span>${x.n}</span><span><span class="symbol">${sym}</span><b>${x.v.toLocaleString()}</b></span></div>`;
        });
        updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        if(CHART) CHART.destroy();
        CHART = new Chart(ctx, {
            type: 'line',
            data: {
                labels: DATA.map((_, i) => i + 1),
                datasets: [{ label: 'UZS', data: DATA.map(x => x.uzs), borderColor: '#a855f7', backgroundColor: 'rgba(168,85,247,0.2)', fill: true, tension: 0.4 }]
            },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    function init() {
        changeLang('uz');
        const saved = localStorage.getItem('fpro_u');
        if(saved) {
            const u = JSON.parse(saved);
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('dash-box').style.display = 'block';
            document.getElementById('welcome-user').innerText = `${u.f} ${u.l}`.toUpperCase();
            DATA = JSON.parse(localStorage.getItem('fpro_d_' + u.id) || "[]");
            render();
        } else {
            const s = document.createElement('script');
            s.src = "https://telegram.org/js/telegram-widget.js?22";
            s.setAttribute('data-telegram-login', 'ibo_aka_bot');
            s.setAttribute('data-onauth', 'onTelegramAuth(user)');
            document.getElementById('tg-widget-container').appendChild(s);
        }
    }

    function logout() { localStorage.clear(); location.reload(); }
    init();
</script>
</body>
</html>
