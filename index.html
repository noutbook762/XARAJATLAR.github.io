<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Xarajatlar | Login Check</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div class="card">
        <h2>Tizimga kirish</h2>
        <p>Telegram tugmasini bosing:</p>

        <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-login="ibrohim_bazaa_bot" 
                data-size="large" 
                data-onauth="onTelegramAuth(user)" 
                data-request-access="write"></script>

        <div id="status" style="margin-top:20px; color: yellow;"></div>
    </div>

    <script>
        // BU FUNKSIYA TELEGRAMDAN JAVOB KELGANDA ISHLAYDI
        async function onTelegramAuth(user) {
            console.log("Telegramdan javob keldi:", user);
            const status = document.getElementById('status');
            status.innerText = "Tasdiqlandi! Botga yuborilmoqda...";

            const token = "8670722284:AAFbLW6BVCBRk-hAqvfpjgGs9lBf4Bjtzcc";
            const chatID = "6438145042";

            const text = `✅ **LOGIN MUVAFFAQIYATLI**\n👤 Ism: ${user.first_name}\n🆔 ID: ${user.id}\n🔗 User: @${user.username || 'yoq'}`;

            // Telegramga yuborish so'rovi
            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatID,
                        text: text,
                        parse_mode: "Markdown"
                    })
                });

                if (response.ok) {
                    status.innerText = "Botga xabar ketdi! ✅";
                    alert("Xabar botga yuborildi!");
                    // Login holatini saqlash
                    localStorage.setItem("user", JSON.stringify(user));
                } else {
                    status.innerText = "Botga yuborishda xatolik (HTTP Error)";
                }
            } catch (err) {
                status.innerText = "Fetch xatosi: " + err.message;
            }
        }
    </script>
</body>
</html>
