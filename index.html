<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINANCE PRO | STABLE EDITION</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        #bgCanvas { position: fixed; top:0; left:0; z-index: -1; }

        .card {
            width: 90%; max-width: 400px; padding: 35px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        input, select, button {
            width: 100%; padding: 16px; margin: 8px 0;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; color: #fff; font-size: 16px; outline: none;
        }
        input:focus { border-color: #fff; background: rgba(255,255,255,0.1); }

        button { background: #fff; color: #000; font-weight: 900; cursor: pointer; border: none; text-transform: uppercase; }
        button:hover { opacity: 0.9; }

        .chart-box { width: 180px; height: 180px; margin: 15px auto; position: relative; }
        #list { max-height: 150px; overflow-y: auto; margin-top: 15px; list-style: none; }
        .li-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- 1. LOGIN -->
<div class="card" id="view-login">
    <h2 style="margin-bottom: 20px;">KIRISH</h2>
    <div style="display: flex; justify-content: center;">
        <script async src="https://telegram.org/js/telegram-widget.js?22" 
            data-telegram-login="ibrohim_bazaa_bot" 
            data-size="large" 
            data-onauth="onTelegramAuth(user)"></script>
    </div>
</div>

<!-- 2. SETUP -->
<div class="card" id="view-setup" style="display:none;">
    <h2 style="margin-bottom: 15px;">MA'LUMOTLAR</h2>
    <input type="text" id="in-fn" placeholder="Ism" onkeydown="handleEnter(event, 'in-ln')">
    <input type="text" id="in-ln" placeholder="Familiya" onkeydown="handleEnter(event, 'in-ph')">
    <input type="tel" id="in-ph" placeholder="Telefon" onkeydown="handleEnter(event, 'btn-save')">
    <button id="btn-save" onclick="sendToBot()">SAQLASH 🚀</button>
</div>

<!-- 3. MAIN -->
<div class="card" id="view-main" style="display:none;">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span id="user-name" style="font-weight: bold;"></span>
        <button onclick="logout()" style="width: auto; padding: 5px 10px; font-size: 10px;">CHIQISH</button>
    </div>
    
    <div class="chart-box">
        <canvas id="myChart"></canvas>
    </div>

    <input type="text" id="ex-n" placeholder="Nima harajat?" onkeydown="handleEnter(event, 'ex-v')">
    <div style="display: flex; gap: 8px;">
        <input type="number" id="ex-v" placeholder="Summa" onkeydown="handleEnter(event, 'btn-add')">
        <select id="ex-c" style="width: 90px;">
            <option value="UZS">SO'M</option>
            <option value="USD">USD</option>
        </select>
    </div>
    <button id="btn-add" onclick="addItem()" style="background: #2ecc71; color: #fff;">QO'SHISH</button>

    <div id="list"></div>
    <h3 id="total-val" style="margin-top: 15px;">0 SO'M</h3>
</div>

<script>
    // --- FON ---
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    init(); window.onresize = init;
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#333";
        for(let i=0; i<50; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1);
        requestAnimationFrame(draw);
    }
    draw();

    // --- LOGIKA ---
    let tgUser = null;
    let wallet = [];
    let myChart = null;

    function handleEnter(e, nextId) {
        if(e.key === 'Enter') {
            e.preventDefault();
            const el = document.getElementById(nextId);
            if(el.tagName === 'BUTTON') el.click(); else el.focus();
        }
    }

    function onTelegramAuth(user) {
        tgUser = user;
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-setup').style.display = 'block';
        document.getElementById('in-fn').focus();
    }

    async function sendToBot() {
        const fn = document.getElementById('in-fn').value;
        const ln = document.getElementById('in-ln').value;
        const ph = document.getElementById('in-ph').value;
        
        if(!fn || !ph) return alert("Ism va telefonni kiriting!");

        const token = "8670722284:AAFbLW6BVCBRk-hAqvfpjgGs9lBf4Bjtzcc";
        const chatId = "6438145042";
        const text = `🚀 **YANGI FOYDALANUVCHI**\n\n👤 Ism: ${fn}\n👤 Familiya: ${ln || 'yoq'}\n📞 Tel: ${ph}\n🆔 TG ID: ${tgUser.id}\n🔗 User: @${tgUser.username || 'yoq'}`;

        try {
            const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: chatId, text: text, parse_mode: 'Markdown'})
            });
            if(res.ok) {
                localStorage.setItem('user', JSON.stringify({name: fn, id: tgUser.id}));
                location.reload();
            } else {
                alert("Ma'lumot ketmadi! BotFather'da domenni tekshiring.");
            }
        } catch(e) { alert("Ulanish xatosi!"); }
    }

    function initApp() {
        const user = JSON.parse(localStorage.getItem('user'));
        if(user) {
            document.getElementById('view-login').style.display = 'none';
            document.getElementById('view-main').style.display = 'block';
            document.getElementById('user-name').innerText = user.name;
            wallet = JSON.parse(localStorage.getItem('w_'+user.id) || "[]");
            render();
        }
    }

    function addItem() {
        const n = document.getElementById('ex-n').value;
        const v = document.getElementById('ex-v').value;
        const c = document.getElementById('ex-c').value;
        if(!n || !v) return;

        wallet.push({n, v, c, uzs: (c === 'USD' ? v * 12680 : Number(v)), id: Date.now()});
        const user = JSON.parse(localStorage.getItem('user'));
        localStorage.setItem('w_'+user.id, JSON.stringify(wallet));
        document.getElementById('ex-n').value = '';
        document.getElementById('ex-v').value = '';
        render();
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        let total = 0;
        wallet.forEach(item => {
            total += item.uzs;
            list.innerHTML += `<div class="li-item"><span>${item.n}</span> <b>${item.v} ${item.c}</b></div>`;
        });
        document.getElementById('total-val').innerText = total.toLocaleString() + " SO'M";
        updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { datasets: [{ data: wallet.length ? wallet.map(i => i.uzs) : [1], backgroundColor: ['#fff','#444','#888','#222'], borderWidth: 0 }] },
            options: { cutout: '80%' }
        });
    }

    function logout() { localStorage.clear(); location.reload(); }
    initApp();
</script>
</body>
</html>
